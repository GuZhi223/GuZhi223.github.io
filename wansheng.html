<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘万圣节礼物</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            color: #f8fafc;
            background:
                radial-gradient(circle at 25% 20%, rgba(255, 138, 76, 0.35), transparent 28%),
                radial-gradient(circle at 75% 25%, rgba(124, 58, 237, 0.28), transparent 30%),
                linear-gradient(135deg, #130f24 0%, #1f1638 48%, #2b160f 100%);
        }

        .stage {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            position: relative;
        }

        .gift-card {
            width: min(92vw, 460px);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            background: rgba(18, 14, 32, 0.82);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            text-align: center;
            backdrop-filter: blur(14px);
            z-index: 2;
        }

        .pumpkin {
            font-size: 64px;
            margin-bottom: 14px;
            animation: float 2.4s ease-in-out infinite;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 30px;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 22px;
            color: #d7d1e8;
            line-height: 1.7;
        }

        button {
            min-width: 150px;
            height: 44px;
            border: 0;
            border-radius: 999px;
            color: #1f1308;
            background: linear-gradient(135deg, #ffb347, #ff7a18);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(255, 122, 24, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(255, 122, 24, 0.35);
        }

        .popup-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }

        .message {
            position: absolute;
            width: 210px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #2f2144;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
            animation: pop 0.35s ease-out both;
        }

        .message small {
            display: block;
            margin-bottom: 4px;
            color: #ff7a18;
            font-size: 12px;
        }

        .note {
            margin-top: 14px;
            color: #9f94ba;
            font-size: 13px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(0.6) rotate(-4deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(var(--rotate));
            }
        }

        @media (max-width: 520px) {
            .gift-card {
                padding: 24px 18px;
            }

            h1 {
                font-size: 25px;
            }

            .message {
                width: min(190px, 78vw);
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="gift-card">
            <div class="pumpkin">🎃</div>
            <h1>神秘万圣节礼物</h1>
            <p>你有一份来自钢的万圣节礼物。点开以后，会收到一点点快乐提示。</p>
            <button id="openGift">打开礼物</button>
            <div class="note">如果浏览器拦截音乐，页面也会正常显示。</div>
        </section>
    </main>

    <div class="popup-layer" id="popupLayer"></div>
    <audio id="bgMusic" preload="none" loop>
        <source src="https://sf5-hl-cdn-tos.douyinstatic.com/obj/ies-music/7499771397531503370.mp3" type="audio/mpeg">
    </audio>

    <script>
        const messages = [
            "万圣节快乐",
            "今天也要开心",
            "记得早点休息",
            "保持微笑呀",
            "你已经很棒啦",
            "好运正在赶来",
            "别被作业吓到",
            "代码会慢慢变听话",
            "愿你每天都有糖",
            "期待下一次见面"
        ];

        const layer = document.getElementById("popupLayer");
        const button = document.getElementById("openGift");
        const music = document.getElementById("bgMusic");

        function randomBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function createMessage(index) {
            const message = document.createElement("div");
            message.className = "message";
            message.style.left = `${randomBetween(8, Math.max(8, window.innerWidth - 230))}px`;
            message.style.top = `${randomBetween(8, Math.max(8, window.innerHeight - 110))}px`;
            message.style.setProperty("--rotate", `${randomBetween(-6, 6)}deg`);
            message.innerHTML = `<small>提示 ${index + 1}</small>${messages[index % messages.length]}`;
            layer.appendChild(message);
        }

        function openGift() {
            button.disabled = true;
            button.textContent = "礼物已打开";

            music.volume = 0.45;
            music.play().catch(() => {});

            layer.innerHTML = "";
            let count = 0;
            const timer = setInterval(() => {
                createMessage(count);
                count += 1;
                if (count >= 36) {
                    clearInterval(timer);
                }
            }, 110);
        }

        button.addEventListener("click", openGift);
    </script>
</body>
</html>
