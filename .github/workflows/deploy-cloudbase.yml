name: Deploy to CloudBase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: Delete the CloudBase /guzhi223 directory before deploying
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: cloudbase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TCB_ENV_ID: guzhi223-d1g8bie1p67d34918
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      CLOUD_PATH: /guzhi223

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p /tmp/cloudbase-site
          rsync -av ./ /tmp/cloudbase-site/ \
            --exclude='.git/' \
            --exclude='.github/'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Validate CloudBase secrets
        run: |
          missing=0
          for name in TENCENTCLOUD_SECRET_ID TENCENTCLOUD_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured. Add it in GitHub repository Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          exit "$missing"

      - name: Login to CloudBase
        run: tcb login --apiKeyId "$TENCENTCLOUD_SECRET_ID" --apiKey "$TENCENTCLOUD_SECRET_KEY"

      - name: Check hosting status
        run: tcb hosting detail --env-id "$TCB_ENV_ID"

      - name: Clean CloudBase directory
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_deploy == 'true' }}
        run: tcb hosting delete "$CLOUD_PATH" --dir --env-id "$TCB_ENV_ID" --yes

      - name: Deploy to CloudBase Hosting
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt"
            if tcb hosting deploy /tmp/cloudbase-site "$CLOUD_PATH" --env-id "$TCB_ENV_ID" --yes; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Verify deployment
        run: |
          curl --fail --silent --show-error --head "https://guzhi223-d1g8bie1p67d34918-1363634311.tcloudbaseapp.com/guzhi223/"
          curl --fail --silent --show-error --head "https://guzhi223-d1g8bie1p67d34918-1363634311.tcloudbaseapp.com/guzhi223/projects/data-structure-quiz/"
