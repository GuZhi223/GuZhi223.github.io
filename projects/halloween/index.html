<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>&#31070;&#31192;&#19975;&#22307;&#33410;&#31036;&#29289;</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            color: #f8fafc;
            background:
                radial-gradient(circle at 22% 18%, rgba(255, 138, 76, 0.34), transparent 27%),
                radial-gradient(circle at 78% 24%, rgba(124, 58, 237, 0.28), transparent 31%),
                linear-gradient(135deg, #130f24 0%, #1f1638 48%, #2b160f 100%);
        }

        .stage {
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
                max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
            position: relative;
        }

        .gift-card {
            width: min(92vw, 460px);
            padding: clamp(22px, 5vw, 32px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            background: rgba(18, 14, 32, 0.84);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            text-align: center;
            backdrop-filter: blur(14px);
            z-index: 2;
            transition: transform 0.45s ease, opacity 0.45s ease;
        }

        .stage.opened .gift-card {
            opacity: 0.34;
            transform: translateY(-18vh) scale(0.86);
        }

        .pumpkin {
            font-size: clamp(52px, 14vw, 70px);
            margin-bottom: 14px;
            animation: float 2.4s ease-in-out infinite;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(26px, 6vw, 34px);
            letter-spacing: 0;
        }

        p {
            margin: 0 0 22px;
            color: #d7d1e8;
            line-height: 1.7;
            font-size: clamp(15px, 3.6vw, 17px);
        }

        button {
            min-width: 150px;
            height: 44px;
            border: 0;
            border-radius: 999px;
            color: #1f1308;
            background: linear-gradient(135deg, #ffb347, #ff7a18);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(255, 122, 24, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(255, 122, 24, 0.35);
        }

        button:disabled {
            cursor: default;
            opacity: 0.85;
        }

        .note {
            margin-top: 14px;
            color: #9f94ba;
            font-size: 13px;
        }

        .popup-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }

        #effectCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .message {
            position: absolute;
            width: var(--bubble-width);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(200, 180, 220, 0.45);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.96);
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            transform: translate(-50%, -50%) scale(0.58) rotate(-5deg);
            animation: pop 0.34s ease-out forwards;
            will-change: transform, opacity;
        }

        .message:nth-child(3n) .dialog-header {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
        }

        .message:nth-child(3n + 1) .dialog-header {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
        }

        .message:nth-child(3n + 2) .dialog-header {
            background: linear-gradient(135deg, #9370db, #7b68ee);
        }

        .dialog-header {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            font-size: calc(var(--bubble-font) * 0.75);
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .dialog-header .icon {
            font-size: calc(var(--bubble-font) * 0.85);
            line-height: 1;
        }

        .dialog-body {
            padding: 5px 8px 6px;
            font-size: var(--bubble-font);
            font-weight: 800;
            color: #37214a;
            text-align: center;
            line-height: 1.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pop {
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(var(--rotate));
            }
        }

        @media (max-width: 640px) {
            .stage.opened .gift-card {
                opacity: 0.26;
                transform: translateY(-25vh) scale(0.72);
            }

            .note {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="stage" id="stage">
        <section class="gift-card">
            <div class="pumpkin">&#127875;</div>
            <h1>&#31070;&#31192;&#19975;&#22307;&#33410;&#31036;&#29289;</h1>
            <p>&#20320;&#26377;&#19968;&#20221;&#26469;&#33258;&#38050;&#30340;&#19975;&#22307;&#33410;&#31036;&#29289;&#12290;&#28857;&#24320;&#21518;&#65292;&#25552;&#31034;&#20250;&#25490;&#25104;&#19968;&#39063;&#29233;&#24515;&#12290;</p>
            <button id="openGift">&#25171;&#24320;&#31036;&#29289;</button>
            <div class="note">&#25163;&#26426;&#21644;&#30005;&#33041;&#37117;&#20250;&#33258;&#21160;&#36866;&#37197;&#29233;&#24515;&#22823;&#23567;</div>
        </section>
    </main>

    <div class="popup-layer" id="popupLayer"></div>
    <canvas id="effectCanvas"></canvas>
    <audio id="bgMusic" preload="none" loop>
        <source src="https://sf5-hl-cdn-tos.douyinstatic.com/obj/ies-music/7499771397531503370.mp3" type="audio/mpeg">
    </audio>

    <script>
        const messages = [
            "\u4e07\u5723\u8282\u5feb\u4e50",
            "\u4eca\u5929\u4e5f\u8981\u5f00\u5fc3",
            "\u8bb0\u5f97\u65e9\u70b9\u4f11\u606f",
            "\u4fdd\u6301\u5fae\u7b11\u5440",
            "\u4f60\u5df2\u7ecf\u5f88\u68d2\u5566",
            "\u597d\u8fd0\u6b63\u5728\u8d76\u6765",
            "\u522b\u88ab\u4f5c\u4e1a\u5413\u5230",
            "\u4ee3\u7801\u4f1a\u53d8\u542c\u8bdd",
            "\u613f\u4f60\u6bcf\u5929\u6709\u7cd6",
            "\u671f\u5f85\u4e0b\u6b21\u89c1\u9762"
        ];

        const stage = document.getElementById("stage");
        const layer = document.getElementById("popupLayer");
        const button = document.getElementById("openGift");
        const music = document.getElementById("bgMusic");
        const canvas = document.getElementById("effectCanvas");
        const ctx = canvas.getContext("2d");

        let opened = false;
        let timers = [];
        let heartComplete = false;

        const PETAL_COLORS = ['#FFB6C1', '#FF69B4', '#FFC0CB', '#FF8C00', '#FF6347', '#9370DB', '#8A2BE2'];
        const FW_COLORS = ['#FF4500', '#FF6347', '#FF8C00', '#FFD700', '#FF1493', '#9370DB', '#FF69B4'];
        const ALL_COLORS = [...new Set([...PETAL_COLORS, ...FW_COLORS])];

        const SIZES = [4, 6, 8, 10, 12, 14, 16];
        const petalCache = new Map();

        function buildPetalCache() {
            SIZES.forEach(size => {
                ALL_COLORS.forEach(color => {
                    const key = `${size}_${color}`;
                    const offscreen = document.createElement('canvas');
                    const s = size * 2 + 4;
                    offscreen.width = s;
                    offscreen.height = s;
                    const oCtx = offscreen.getContext('2d');
                    const cx = s / 2;
                    const cy = s / 2;
                    oCtx.translate(cx, cy);
                    oCtx.beginPath();
                    oCtx.moveTo(0, -size);
                    oCtx.bezierCurveTo(size * 0.8, -size * 0.8, size * 0.8, size * 0.3, 0, size);
                    oCtx.bezierCurveTo(-size * 0.8, size * 0.3, -size * 0.8, -size * 0.8, 0, -size);
                    oCtx.fillStyle = color;
                    oCtx.fill();
                    oCtx.beginPath();
                    oCtx.moveTo(0, -size * 0.6);
                    oCtx.bezierCurveTo(size * 0.3, -size * 0.4, size * 0.3, size * 0.1, 0, size * 0.6);
                    oCtx.bezierCurveTo(-size * 0.3, size * 0.1, -size * 0.3, -size * 0.4, 0, -size * 0.6);
                    oCtx.fillStyle = 'rgba(255,255,255,0.25)';
                    oCtx.fill();
                    petalCache.set(key, offscreen);
                });
            });
        }
        buildPetalCache();

        function getCachedPetal(size, color) {
            const clampedSize = Math.round(size / 2) * 2;
            const s = Math.max(SIZES[0], Math.min(SIZES[SIZES.length - 1], clampedSize));
            return petalCache.get(`${s}_${color}`);
        }

        function rand(a, b) { return Math.random() * (b - a) + a; }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        const PHASE = { FIREWORK: 0, FALLING: 1 };
        const FIREWORK_DURATION = 1400;
        const FIREWORK_DECAY_MIN = 0.006;
        const FIREWORK_DECAY_MAX = 0.013;
        const TRANSITION_DECAY = 0.003;

        const POOL_MAX = 400;
        const pool = [];

        function acquire() {
            if (pool.length > 0) return pool.pop();
            return {};
        }

        function release(p) {
            if (pool.length < POOL_MAX) pool.push(p);
        }

        const particles = [];
        let phaseStartTime = 0;
        let phase = null;
        let animFrameId = null;
        let frameTick = 0;

        function initFireworkParticle(p, x, y) {
            const angle = rand(0, Math.PI * 2);
            const speed = rand(2, 8);
            p.x = x;
            p.y = y;
            p.vx = Math.cos(angle) * speed;
            p.vy = Math.sin(angle) * speed - rand(0.5, 2);
            p.size = rand(4, 12);
            p.color = pick(ALL_COLORS);
            p.life = 1;
            p.decay = rand(FIREWORK_DECAY_MIN, FIREWORK_DECAY_MAX);
            p.gravity = 0.06;
            p.rotation = rand(0, Math.PI * 2);
            p.rotSpeed = rand(-0.08, 0.08);
            p.phase = PHASE.FIREWORK;
            p.sway = 0;
            p.swayFreq = 0;
            p.swayAmp = 0;
            p.fadeIn = 0;
            return p;
        }

        function transitionToFalling(p) {
            p.phase = PHASE.FALLING;
            p.decay = TRANSITION_DECAY;
            p.gravity = 0.012;
            p.vx *= 0.15;
            p.vy = Math.abs(p.vy) * 0.2 + rand(0.3, 1.0);
            p.size = rand(6, 14);
            p.color = pick(PETAL_COLORS);
            p.rotSpeed = rand(-0.025, 0.025);
            p.sway = rand(0, Math.PI * 2);
            p.swayFreq = rand(0.008, 0.025);
            p.swayAmp = rand(0.4, 1.2);
            p.life = rand(0.7, 1);
            return p;
        }

        function spawnFallingPetal(fromTop) {
            const p = acquire();
            p.x = rand(0, canvas.width);
            p.y = fromTop ? rand(-canvas.height, 0) : rand(-100, -10);
            p.vx = rand(-0.2, 0.2);
            p.vy = rand(0.5, 1.6);
            p.size = rand(6, 14);
            p.color = pick(PETAL_COLORS);
            p.life = 1;
            p.decay = 0;
            p.gravity = 0;
            p.rotation = rand(0, Math.PI * 2);
            p.rotSpeed = rand(-0.025, 0.025);
            p.phase = PHASE.FALLING;
            p.sway = rand(0, Math.PI * 2);
            p.swayFreq = rand(0.008, 0.025);
            p.swayAmp = rand(0.4, 1.2);
            p.fadeIn = fromTop ? 1 : 0;
            particles.push(p);
        }

        function spawnFireworkBurst(x, y) {
            const count = rand(24, 36) | 0;
            for (let i = 0; i < count; i++) {
                const p = acquire();
                initFireworkParticle(p, x, y);
                particles.push(p);
            }
        }

        function updateParticle(p, dt) {
            if (p.phase === PHASE.FIREWORK) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.985;
                p.rotation += p.rotSpeed;
                p.life -= p.decay;

                if (p.life <= 0.35) {
                    transitionToFalling(p);
                }
            } else {
                p.sway += p.swayFreq;
                p.x += p.vx + Math.sin(p.sway) * p.swayAmp;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vy = Math.min(p.vy, 2.5);
                p.vx *= 0.995;
                p.rotation += p.rotSpeed;
                if (p.fadeIn > 0) p.fadeIn = Math.max(0, p.fadeIn - 0.015);

                if (p.decay > 0) {
                    p.life -= p.decay;
                }

                if (p.y > canvas.height + 30) {
                    p.x = rand(0, canvas.width);
                    p.y = rand(-80, -10);
                    p.vy = rand(0.5, 1.6);
                    p.vx = rand(-0.2, 0.2);
                    p.life = 1;
                    p.fadeIn = 1;
                    p.sway = rand(0, Math.PI * 2);
                }
            }
        }

        function drawParticle(p) {
            if (p.life <= 0 && p.decay > 0) return;
            const alpha = Math.max(0, Math.min(1, p.life - p.fadeIn));
            if (alpha <= 0) return;

            const cached = getCachedPetal(p.size, p.color);
            if (!cached) return;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);

            if (p.phase === PHASE.FIREWORK && p.life > 0.6) {
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 12 * p.life;
            }

            ctx.drawImage(cached, -cached.width / 2, -cached.height / 2);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function cleanup() {
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].life <= 0 && particles[i].decay > 0) {
                    release(particles[i]);
                    particles.splice(i, 1);
                }
            }
        }

        function startFireworkAnimation() {
            phase = PHASE.FIREWORK;
            phaseStartTime = performance.now();
            frameTick = 0;
            runLoop();
        }

        function runLoop() {
            frameTick++;
            const now = performance.now();
            const elapsed = now - phaseStartTime;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (phase === PHASE.FIREWORK && elapsed < FIREWORK_DURATION) {
                if (Math.random() > 0.55) {
                    const x = rand(canvas.width * 0.15, canvas.width * 0.85);
                    const y = rand(canvas.height * 0.15, canvas.height * 0.5);
                    spawnFireworkBurst(x, y);
                }
            }

            if (phase === PHASE.FIREWORK && elapsed >= FIREWORK_DURATION) {
                const hasFwParticles = particles.some(p => p.phase === PHASE.FIREWORK);
                if (!hasFwParticles) {
                    phase = PHASE.FALLING;
                    phaseStartTime = now;
                    const count = Math.min(60, Math.floor(canvas.width / 18));
                    for (let i = 0; i < count; i++) {
                        spawnFallingPetal(true);
                    }
                }
            }

            for (let i = 0; i < particles.length; i++) {
                updateParticle(particles[i], 1);
            }

            for (let i = 0; i < particles.length; i++) {
                drawParticle(particles[i]);
            }

            if (frameTick % 30 === 0) cleanup();

            animFrameId = requestAnimationFrame(runLoop);
        }

        function getLayout() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mobile = width < 640;
            const bubbleWidth = mobile ? Math.max(62, Math.min(80, width / 5.8)) : Math.max(82, Math.min(116, width / 9.5));
            const bubbleHeight = mobile ? 50 : 58;
            const centerX = width / 2;
            const centerY = mobile ? height * 0.5 : height * 0.5;
            const scale = Math.min(
                (width - bubbleWidth * 1.8) / 34,
                (height - bubbleHeight * 3.0) / 30,
                mobile ? 10 : 18
            );

            return {
                count: mobile ? 34 : 64,
                bubbleWidth,
                bubbleHeight,
                fontSize: mobile ? 10 : 12,
                centerX,
                centerY,
                scale: Math.max(6, scale)
            };
        }

        function heartPoint(index, count, layout) {
            const t = Math.PI - (index / count) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return {
                x: layout.centerX + x * layout.scale,
                y: layout.centerY - y * layout.scale
            };
        }

        function clearTimers() {
            timers.forEach((timer) => clearTimeout(timer));
            timers = [];
        }

        function renderHeart() {
            clearTimers();
            layer.innerHTML = "";
            heartComplete = false;

            const layout = getLayout();
            layer.style.setProperty("--bubble-width", `${layout.bubbleWidth}px`);
            layer.style.setProperty("--bubble-height", `${layout.bubbleHeight}px`);
            layer.style.setProperty("--bubble-font", `${layout.fontSize}px`);

            const dialogIcons = ["\ud83c\udf83", "\u2728", "\ud83c\udf1f", "\ud83d\udc9c", "\ud83c\udf42"];
            const dialogTitles = ["\u795d\u798f", "\u5173\u6000", "\u5bc6\u8bed", "\u5fc3\u610f", "\u6e29\u6696"];

            for (let i = 0; i < layout.count; i += 1) {
                const timer = setTimeout(() => {
                    const point = heartPoint(i, layout.count, layout);

                    const message = document.createElement("div");
                    message.className = "message";
                    message.style.left = `${point.x}px`;
                    message.style.top = `${point.y}px`;
                    message.style.setProperty("--rotate", `${(i % 7) - 3}deg`);

                    const header = document.createElement("div");
                    header.className = "dialog-header";
                    const icon = document.createElement("span");
                    icon.className = "icon";
                    icon.textContent = dialogIcons[i % dialogIcons.length];
                    const title = document.createElement("span");
                    title.textContent = dialogTitles[i % dialogTitles.length];
                    header.appendChild(icon);
                    header.appendChild(title);

                    const body = document.createElement("div");
                    body.className = "dialog-body";
                    body.textContent = messages[i % messages.length];

                    message.appendChild(header);
                    message.appendChild(body);
                    layer.appendChild(message);

                    if (i === layout.count - 1) {
                        heartComplete = true;
                        startFireworkAnimation();
                    }
                }, i * 120);
                timers.push(timer);
            }
        }

        function openGift() {
            opened = true;
            stage.classList.add("opened");
            button.disabled = true;
            button.textContent = "\u7231\u5fc3\u5df2\u7ed8\u5236";

            music.volume = 0.42;
            music.play().catch(() => {});
            renderHeart();
        }

        button.addEventListener("click", openGift);
        window.addEventListener("resize", () => {
            if (opened) {
                renderHeart();
            }
        });
    </script>
</body>
</html>
