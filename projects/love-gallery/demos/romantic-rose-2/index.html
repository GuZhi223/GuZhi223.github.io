<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 致最爱的人</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="text-box">
            <h2>致最爱的人</h2>
            <p>有人说，当赤绳系定，便今生注定。</p>
            <p>你是我最美的缘，也是我今生的眷恋。</p>
            <p>遇见你，花光了我所有的运气。</p>
            <p>此后的日子，愿与你晨昏相伴，岁月静好。</p>
            <p>往后余生，风雪是你，平淡是你，</p>
            <p>清贫是你，荣华是你，</p>
            <p>心底温柔是你，目光所至，也是你。</p>
        </div>
        <!-- 添加玫瑰花装饰 -->
        <div class="rose left-rose"></div>
        <div class="rose right-rose"></div>
    </div>

    <script src="rose.js"></script>
</body>

</html>
