<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星门塔罗 | 3D 手势抽牌</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --theme: #b78cff;
      --theme-soft: rgba(183, 140, 255, 0.22);
      --panel: rgba(18, 14, 35, 0.58);
      --line: rgba(255,255,255,0.16);
      --text: #f5efff;
      --muted: rgba(245,239,255,0.68);
      --gold: #f1d68a;
      --danger: #ff6bba;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(135, 68, 255, 0.28), transparent 32%),
        radial-gradient(circle at 78% 70%, rgba(255, 84, 190, 0.16), transparent 30%),
        linear-gradient(135deg, #03020a 0%, #0a0718 52%, #110820 100%);
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #threeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .grain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0.2;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.28) 1px, transparent 0);
      background-size: 34px 34px;
      mix-blend-mode: screen;
    }

    .vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.52) 100%);
    }

    .intro-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(48, 35, 94, 0.72), rgba(7, 8, 22, 0.88) 72%),
        linear-gradient(135deg, rgba(241,214,138,0.08), rgba(169,139,255,0.10));
      backdrop-filter: blur(10px);
      transition: opacity 1.2s ease, transform 1s ease;
    }

    .intro-modal.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    .intro-card {
      width: min(520px, 90vw);
      border: 1px solid rgba(241, 214, 138, 0.16);
      border-radius: 0;
      padding: 40px;
      background: rgba(18, 13, 36, 0.34);
      box-shadow: 0 24px 90px rgba(0,0,0,0.28), inset 0 0 40px rgba(169,139,255,0.05);
      backdrop-filter: blur(12px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .intro-card::before, .intro-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .intro-card::before {
      inset: 16px;
      border: 1px solid rgba(241,214,138,0.08);
    }

    .intro-card::after {
      left: 24px;
      right: 24px;
      bottom: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(241,214,138,0.35), transparent);
    }

    .sigil {
      width: 64px;
      height: 64px;
      margin: 0 auto 30px;
      border-radius: 0;
      border: 1px solid rgba(241, 214, 138, 0.42);
      background: transparent;
      box-shadow: 0 0 16px rgba(142,110,227,0.12);
      position: relative;
      transform: rotate(45deg);
      animation: breathe 4s ease-in-out infinite alternate, sigilSpin 20s linear infinite;
    }

    .sigil::before, .sigil::after {
      content: "";
      position: absolute;
      border-radius: 0;
    }

    .sigil::before {
      inset: 9px;
      border: 1px solid rgba(142, 110, 227, 0.62);
      transform: rotate(45deg);
      animation: sigilSpin 12s linear infinite reverse;
    }

    .sigil::after {
      inset: 22px;
      border: 1px solid rgba(241, 214, 138, 0.34);
      background: rgba(241,214,138,0.5);
      animation: breathe 3s ease-in-out infinite alternate-reverse;
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 10px rgba(142,110,227,0.12), 0 0 20px rgba(241,214,138,0.05); }
      100% { box-shadow: 0 0 30px rgba(142,110,227,0.42), 0 0 50px rgba(241,214,138,0.15); }
    }

    @keyframes sigilSpin {
      from { transform: rotate(45deg); }
      to { transform: rotate(405deg); }
    }

    .intro-card h1 {
      margin: 0 0 20px;
      font-size: clamp(26px, 5vw, 34px);
      letter-spacing: .36em;
      font-weight: 300;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(241, 214, 138, 0.35);
    }

    .intro-card p {
      margin: 0 auto 30px;
      max-width: 430px;
      line-height: 2;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
    }

    textarea {
      width: 100%;
      min-height: 104px;
      resize: none;
      outline: none;
      color: var(--gold);
      font-size: 15px;
      line-height: 1.8;
      padding: 15px 0;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.22);
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      text-align: center;
      font-family: inherit;
      transition: border-color .3s ease, box-shadow .3s ease;
    }

    textarea:focus {
      border-bottom-color: var(--gold);
      box-shadow: 0 18px 26px -28px rgba(241,214,138,.7);
    }

    textarea::placeholder {
      color: rgba(243,236,255,0.38);
      text-align: center;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 34px;
    }

    .start-btn, .ghost-btn, .restart-btn {
      border: 0;
      cursor: pointer;
      color: white;
      font-weight: 800;
      letter-spacing: .18em;
      border-radius: 2px;
      transition: transform .28s ease, box-shadow .28s ease, color .28s ease, border-color .28s ease, background .28s ease;
    }

    .start-btn, .ghost-btn {
      width: 100%;
      padding: 12px 18px;
      font-size: 13px;
      color: rgba(255,255,255,.9);
      background: transparent;
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: none;
    }

    .ghost-btn {
      color: rgba(245,239,255,.64);
      border-color: rgba(255,255,255,.16);
    }

    .ghost-btn.recommended {
      color: #160f24;
      border-color: rgba(241,214,138,.86);
      background: linear-gradient(135deg, rgba(241,214,138,.96), rgba(255,235,176,.82));
      box-shadow: 0 0 30px rgba(241,214,138,.24);
    }

    .ghost-btn.recommended::after {
      content: "推荐";
      margin-left: 8px;
      font-size: 10px;
      letter-spacing: .12em;
      opacity: .72;
    }

    .start-btn:hover, .ghost-btn:hover, .restart-btn:hover {
      transform: translateY(-1px);
      filter: none;
      color: var(--gold);
      border-color: rgba(241,214,138,.72);
      background: rgba(241,214,138,0.08);
      box-shadow: 0 0 26px rgba(241, 214, 138, 0.18);
    }

    .seed-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 0 0 18px;
    }

    .seed-btn {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 7px 10px;
      color: rgba(245,239,255,.56);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: .08em;
    }

    .seed-btn:hover {
      color: var(--gold);
      border-color: rgba(241,214,138,.38);
    }

    .hud {
      position: fixed;
      z-index: 20;
      left: 50%;
      top: 18px;
      width: min(520px, calc(100vw - 32px));
      transform: translateX(-50%);
      pointer-events: none;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 28px;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 10px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(6, 4, 15, .38);
      color: rgba(245,239,255,.62);
      backdrop-filter: blur(12px);
      font-size: 12px;
      line-height: 1.45;
    }

    .phase-track {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      width: min(340px, 100%);
      margin: 0 auto;
    }

    .phase {
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      color: rgba(245,239,255,.48);
      background: rgba(255,255,255,.05);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .phase.active {
      color: white;
      border-color: rgba(255,255,255,.24);
      background: linear-gradient(135deg, rgba(183,140,255,.28), rgba(255,129,216,.16));
      box-shadow: 0 0 18px rgba(183,140,255,.16);
    }

    .fist-focus-ring {
      position: fixed;
      left: 50%;
      top: 45%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1.5px solid rgba(241,214,138,0.3);
      box-shadow: 0 0 30px rgba(241,214,138,0.15), inset 0 0 30px rgba(241,214,138,0.08);
      pointer-events: none;
      z-index: 150;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .fist-focus-ring.visible {
      opacity: 1;
      animation: focusRingSpin 4s linear infinite, focusRingPulse 2s ease-in-out infinite;
    }
    @keyframes focusRingSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes focusRingPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(241,214,138,0.15), inset 0 0 30px rgba(241,214,138,0.08); }
      50% { box-shadow: 0 0 50px rgba(241,214,138,0.25), inset 0 0 50px rgba(241,214,138,0.14); }
    }

    .dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 16px var(--danger);
    }

    .dot.on {
      background: #80ffcd;
      box-shadow: 0 0 16px #80ffcd;
    }

    .hint {
      position: fixed;
      left: 22px;
      bottom: 20px;
      z-index: 15;
      max-width: min(520px, calc(100vw - 44px));
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(9, 6, 20, .52);
      backdrop-filter: blur(14px);
      color: rgba(245,239,255,.74);
      font-size: 13px;
      line-height: 1.7;
    }

    .question-result {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: 42px;
      width: min(760px, calc(100vw - 42px));
      transform: translateX(-50%) translateY(28px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease, transform .8s ease;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 24px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        rgba(10, 7, 23, .74);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      text-align: center;
    }

    .question-result.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .result-kicker {
      margin-bottom: 6px;
      color: rgba(245,239,255,.58);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .18em;
    }

    .result-card-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 8px;
      border-radius: 16px;
      border: 1px solid rgba(241,214,138,.32);
      background: rgba(241,214,138,.06);
      display: grid;
      place-items: center;
      line-height: 1;
      box-shadow: 0 0 24px rgba(241,214,138,.12);
      position: relative;
      overflow: hidden;
      animation: cardIconPulse 3s ease-in-out infinite alternate;
    }

    .result-card-icon::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 12px;
      border: 1px solid rgba(241,214,138,.18);
      pointer-events: none;
      z-index: 1;
    }

    .result-card-icon::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(to right, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) top left,
        linear-gradient(to bottom, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) top left,
        linear-gradient(to left, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) top right,
        linear-gradient(to bottom, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) top right,
        linear-gradient(to right, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) bottom left,
        linear-gradient(to top, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) bottom left,
        linear-gradient(to left, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) bottom right,
        linear-gradient(to top, rgba(241,214,138,.4) 0px, rgba(241,214,138,.4) 12px, transparent 12px) bottom right;
      background-size: 50% 50%;
      background-repeat: no-repeat;
    }

    @keyframes cardIconPulse {
      0% { box-shadow: 0 0 20px rgba(241,214,138,.08), inset 0 0 12px rgba(241,214,138,.04); border-color: rgba(241,214,138,.22); }
      100% { box-shadow: 0 0 40px rgba(241,214,138,.25), inset 0 0 20px rgba(241,214,138,.08); border-color: rgba(241,214,138,.5); }
    }

    .result-card-numeral {
      display: block;
      position: relative;
      z-index: 2;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .14em;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 12px rgba(241,214,138,.3);
    }

    .result-card-symbol {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 44px;
      line-height: 1;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .result-card-subtitle {
      margin: 0 auto 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(245,239,255,.55);
    }

    .result-card-brief {
      margin: 0 auto 12px;
      max-width: 360px;
      font-size: 13px;
      line-height: 1.7;
      color: rgba(245,239,255,.5);
      text-align: center;
    }

    .question-result h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.1;
    }

    .question-result .q {
      margin-bottom: 10px;
      color: rgba(245,239,255,.66);
      font-size: 13px;
    }

    .question-result .a {
      color: white;
      font-size: 16px;
      line-height: 1.75;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
      text-align: left;
    }

    .result-note {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,.055);
    }

    .result-note strong {
      display: block;
      margin-bottom: 4px;
      color: rgba(255,255,255,.94);
      font-size: 13px;
    }

    .result-note span {
      color: rgba(245,239,255,.7);
      font-size: 13px;
      line-height: 1.65;
    }

    .restart-btn {
      margin-top: 0;
      padding: 11px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(183,140,255,.9), rgba(255,129,216,.86));
      box-shadow: 0 12px 32px rgba(183,140,255,.2);
    }

    .btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .18em;
      font-size: 13px;
      padding: 11px 24px;
      border-radius: 999px;
      transition: all .28s ease;
      font-family: inherit;
      outline: none;
    }

    .btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    .btn:disabled {
      opacity: .38;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-accent {
      color: #160f24;
      background: linear-gradient(135deg, rgba(241,214,138,.92), rgba(255,235,176,.84));
      border: 1px solid rgba(241,214,138,.6);
      box-shadow: 0 0 24px rgba(241,214,138,.2), 0 4px 16px rgba(241,214,138,.12);
    }

    .btn-accent:hover {
      background: linear-gradient(135deg, rgba(241,214,138,1), rgba(255,235,176,.94));
      border-color: rgba(241,214,138,.86);
      box-shadow: 0 0 36px rgba(241,214,138,.32), 0 6px 24px rgba(241,214,138,.18);
      transform: translateY(-1px);
    }

    .btn-accent:active {
      transform: translateY(0);
      box-shadow: 0 0 14px rgba(241,214,138,.16);
    }

    .btn-ghost {
      color: rgba(245,239,255,.64);
      background: transparent;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: none;
    }

    .btn-ghost:hover {
      color: rgba(245,239,255,.92);
      border-color: rgba(255,255,255,.36);
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 20px rgba(183,140,255,.1);
      transform: translateY(-1px);
    }

    .btn-ghost:active {
      transform: translateY(0);
    }

    .spread-actions {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .spread-actions .btn,
    .spread-actions .restart-btn {
      width: 100%;
      max-width: 260px;
    }

    .video-wrap {
      position: fixed;
      z-index: 18;
      left: 22px;
      top: 22px;
      width: 180px;
      height: 135px;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      box-shadow: 0 15px 50px rgba(0,0,0,.28);
      opacity: .68;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .hand-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    .mystic-frame {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 12;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .mystic-frame.visible {
      opacity: 1;
    }

    .mystic-frame .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border-color: rgba(241,214,138,.22);
      border-style: solid;
      border-width: 0;
    }

    .mystic-frame .corner.tl { top: 16px; left: 16px; border-top-width: 1px; border-left-width: 1px; }
    .mystic-frame .corner.tr { top: 16px; right: 16px; border-top-width: 1px; border-right-width: 1px; }
    .mystic-frame .corner.bl { bottom: 16px; left: 16px; border-bottom-width: 1px; border-left-width: 1px; }
    .mystic-frame .corner.br { bottom: 16px; right: 16px; border-bottom-width: 1px; border-right-width: 1px; }

    .mystic-frame .line-h {
      position: absolute;
      height: 1px;
      left: 110px;
      right: 110px;
      background: linear-gradient(90deg, transparent, rgba(241,214,138,.18), transparent);
    }

    .mystic-frame .line-h.top { top: 16px; }
    .mystic-frame .line-h.bottom { bottom: 16px; }

    .mystic-frame .line-v {
      position: absolute;
      width: 1px;
      top: 110px;
      bottom: 110px;
      background: linear-gradient(180deg, transparent, rgba(241,214,138,.18), transparent);
    }

    .mystic-frame .line-v.left { left: 16px; }
    .mystic-frame .line-v.right { right: 16px; }

    .mystic-frame .diamond {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(241,214,138,.35);
      transform: rotate(45deg);
      top: 11px;
      left: 50%;
      margin-left: -5px;
    }

    .screen-flash {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 25;
      background: radial-gradient(circle at center, rgba(241,214,138,.42), transparent 70%);
      opacity: 0;
      animation: none;
    }

    .screen-flash.active {
      animation: flashBurst .8s ease-out forwards;
    }

    @keyframes flashBurst {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 900px) {
      .hud { top: 10px; }
      .status { font-size: 11px; margin-bottom: 7px; }
      .phase { min-height: 26px; font-size: 10px; }
      .hint { display: none; }
      .video-wrap { width: 132px; height: 99px; left: 12px; top: 12px; }

      .intro-modal {
        padding: 16px;
        overflow-y: auto;
        align-content: center;
        -webkit-overflow-scrolling: touch;
      }

      .intro-card {
        padding: 22px 18px;
      }

      .intro-card::before {
        inset: 8px;
      }

      .intro-card::after {
        left: 14px;
        right: 14px;
        bottom: 10px;
      }

      .sigil {
        width: 40px;
        height: 40px;
        margin-bottom: 14px;
      }

      .sigil::before {
        inset: 6px;
      }

      .sigil::after {
        inset: 14px;
      }

      .intro-card h1 {
        margin-bottom: 10px;
        font-size: clamp(22px, 6vw, 28px);

<body>
  <div id="app">
    <canvas id="threeCanvas"></canvas>
    <div class="fist-focus-ring" id="fistFocusRing"></div>

        <div id="dailyCard" class="daily-card" style="display:none;">
          <div class="daily-label">✦ 今日塔罗 ✦</div>
          <div id="dailyName" class="daily-name"></div>

          <button class="seed-btn" data-seed="这件事下一步应该怎么推进？">✦ 下一步</button>

    <aside class="hud">
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">等待开始感知</span>
      </div>

    <div class="video-wrap">
      <video id="video" playsinline muted></video>
      <canvas id="handCanvas" class="hand-canvas"></canvas>
    </div>

    <div class="hint">
      手势说明：手掌左右移动会旋转牌堆；离正前方最近的牌会浮起发光。完成「张开 → 握拳 → 张开」后抽出当前高亮牌。没有摄像头时，移动鼠标或手指选择牌位，点击画面即可抽取。
    </div>

    <div id="resultBox" class="question-result">
      <div class="result-kicker">THE CARD OPENS</div>
      <div id="resultCardIcon" class="result-card-icon"></div>
      <div id="resultCardSubtitle" class="result-card-subtitle"></div>

        <div class="result-note">
          <strong>行动建议</strong>
          <span id="resultAction"></span>
        </div>
      </div>
      <button id="restartBtn" class="restart-btn">✦ 新牌阵</button>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    const tarotDeck = [
      { name: "愚者", meaning: "新的旅程正在打开。它提醒你允许自己尝试，但不要把冲动误认为勇气。", reversed: "鲁莽，失控，恐惧未知" },
      { name: "魔术师", meaning: "你手里已经有足够的工具。关键不是再等条件成熟，而是开始组合已有资源。", reversed: "欺骗，滥用才能，缺乏计划" },
      { name: "女祭司", meaning: "答案不急着说出口。多观察隐藏的信息，直觉会比表面逻辑更早抵达。", reversed: "过于理性，忽视直觉，秘密" },
      { name: "女皇", meaning: "事情需要被温柔地培育。给它时间，也给自己一点稳定的滋养。", reversed: "过度依赖，缺乏创造力，冷漠" },
      { name: "皇帝", meaning: "边界、秩序和责任变得重要。你需要把松散的想法落到清晰规则里。", reversed: "控制欲，固执，缺乏灵活性" },
      { name: "教皇", meaning: "传统经验或可靠的前辈能给你支点。别急着孤军奋战。", reversed: "叛逆传统，过于教条，自以为是" },
      { name: "恋人", meaning: "选择背后是价值排序。真正的问题不是选谁，而是你想成为什么样的人。", reversed: "不和谐，选择失误，价值观冲突" },
      { name: "战车", meaning: "方向已经出现，但需要纪律感。把分散的力气收回来，稳稳推进。", reversed: "失控，方向不明，攻击性" },
      { name: "力量", meaning: "这不是硬碰硬的局面。温和、耐心、自控，反而是更强的力量。", reversed: "自我怀疑，软弱，缺乏自制" },
      { name: "隐者", meaning: "暂时后退不是逃避，而是为了看清。安静下来，答案会变得更具体。", reversed: "孤独，逃避社交，过于封闭" },
      { name: "命运之轮", meaning: "局势正在转动。你无法控制全部变化，但可以抓住变化中的窗口。", reversed: "抗拒变化，厄运，外力干扰" },
      { name: "正义", meaning: "请回到事实与后果。公平不只对别人，也包括对自己诚实。", reversed: "不公正，不负责任，偏见" },
      { name: "倒吊人", meaning: "停顿本身就是信息。换一个角度看，你会发现真正被卡住的地方。", reversed: "拖延，自私，无意义的牺牲" },
      { name: "死神", meaning: "某个阶段正在结束。它未必是坏事，旧结构退场后，新空间才会出现。", reversed: "抗拒结束，停滞，恐惧变化" },
      { name: "节制", meaning: "答案在调和之中。不要走极端，把节奏放慢一点会更稳。", reversed: "失衡，过度，缺乏耐心" },
      { name: "恶魔", meaning: "有些东西看似吸引，其实在消耗你。看清依赖，才有松绑的可能。", reversed: "束缚，上瘾，物质主义" },
      { name: "高塔", meaning: "不稳定的结构可能被打破。震动虽然难受，却能暴露真正的问题。", reversed: "逃避灾难，恐惧改变，延期" },
      { name: "星星", meaning: "希望不是空话，而是恢复感正在发生。请给自己一点重新相信的空间。", reversed: "缺乏信心，脱离现实，不切实际" },
      { name: "月亮", meaning: "情绪和想象会放大不确定。别急着下结论，先分清事实与投射。", reversed: "幻觉，焦虑，误解" },
      { name: "太阳", meaning: "事情会变得更明亮。坦诚、直接、简单，可能是最有效的方式。", reversed: "过度乐观，精力不足，延迟的成功" },
      { name: "审判", meaning: "你正在面对一次重新评估。过去的经验不是包袱，而是提醒。", reversed: "自我怀疑，逃避评估，拒绝转变" },
      { name: "世界", meaning: "一个循环接近完成。你可以收束、确认成果，然后进入新的阶段。", reversed: "未完成，缺乏结局，感到不完整" }
    ];

    const isMobileUA = /Android|iPhone|iPad|iPod|Mobile|HarmonyOS|MiuiBrowser|HuaweiBrowser/i.test(navigator.userAgent);
    const profiles = {
      visual: {
        pixelRatio: Math.min(window.devicePixelRatio, 1.8),
        activeParticles: 4600,
        particleLerp: 0.058,
        pointSize: 0.048,
        pointPulse: 0.008,
        opacityBase: 0.82,
        opacityPulse: 0.12
      },
      gestureLite: {
        pixelRatio: Math.min(window.devicePixelRatio, 1),
        activeParticles: 1200,
        particleLerp: 0.035,
        pointSize: 0.036,
        pointPulse: 0.003,
        opacityBase: 0.62,
        opacityPulse: 0.04
      }
    };

    let audioCtx = null;
    let ambientOsc = null;
    let ambientGain = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playFistHum() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = 120;
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
    }

    function playFlipSweep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
    }

    function playPulseHit() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.22, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }

    function startAmbient() {
      if (!audioCtx || ambientOsc) return;
      ambientOsc = audioCtx.createOscillator();
      ambientGain = audioCtx.createGain();
      ambientOsc.type = "sine";
      ambientOsc.frequency.value = 55;
      ambientGain.gain.value = 0.04;
      ambientOsc.connect(ambientGain);
      ambientGain.connect(audioCtx.destination);
      ambientOsc.start();
    }

    function stopAmbient() {
      if (ambientOsc) {
        ambientOsc.stop();
        ambientOsc.disconnect();
        ambientOsc = null;
      }
      if (ambientGain) {
        ambientGain.disconnect();
        ambientGain = null;
      }
    }

    const appState = {
      started: false,
      drawn: false,
      userQuestion: "",
      theme: new THREE.Color("#b78cff"),
      particleMode: "cosmos",
      renderProfile: "visual",
      activeParticles: profiles.visual.activeParticles,
      deckRotation: 0,
      targetDeckRotation: 0,
      highlightedIndex: 0,
      handX: 0.5,
      handTargetX: 0.5,
      handY: 0,
      handTargetY: 0.5,
      targetDeckTilt: 0,
      handZ: 0,
      handVelocityX: 0,
      handPrevX: 0.5,
      handLastMoveTime: 0,
      smoothedSensitivity: 1.0,
      currentDamping: 1.0,
      dampingTarget: 1.0,
      fistFocusRingVisible: false,
      touchStartX: 0,
      touchStartY: 0,
      touchStartTime: 0,
      touchIsTap: false,
      touchDeadzonePassed: false,
      manualMode: false,
      shuffling: false,
      gesture: "unknown",
      gestureSamples: [],
      releaseFrames: 0,
      gesturePhase: "waitingOpen",
      lastGestureChange: performance.now(),
      lastPhaseChange: performance.now(),
      lastHandSeen: 0,
      chosenCardName: "",
      cameraReady: false,
      magicCircle: { active: false, history: [], circleCount: 0, lastCircleTime: 0, rotation: 0, targetRotation: 0 },
      drawnCards: [],
      currentTarot: null,
      maxSpread: 3
    };

    const gestureConfig = {
      depthMin: -0.18,
      depthMax: 0.06,
      powerExponent: 0.55,

      ctx.lineTo(412, 530);
      ctx.stroke();
      ctx.fillStyle = accent.main;
      ctx.beginPath();
      ctx.moveTo(100, 530);
      ctx.lineTo(94, 526);
      ctx.lineTo(94, 534);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(412, 530);
      ctx.lineTo(418, 526);
      ctx.lineTo(418, 534);
      ctx.closePath();
      ctx.fill();

      ctx.font = "400 24px 'Microsoft YaHei', sans-serif";
      ctx.fillStyle = "rgba(88,52,18,.82)";
      wrapText(ctx, tarot.meaning, cx, 572, 360, 38);

      ctx.save();
      ctx.shadowColor = accent.glow;
      ctx.shadowBlur = 10;
      ctx.font = "400 18px Georgia, serif";
      ctx.fillStyle = accent.main;
      ctx.fillText("✦  ✦  ✦", cx, 710);
      ctx.restore();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      let line = "";
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = chars[i];
          y += lineHeight;
        } else {
          line = test;
        }
      }
      ctx.fillText(line, x, y);
    }

    const cardGeo = new THREE.BoxGeometry(CARD_W, CARD_H, 0.055, 2, 2, 1);
    const edgeGeo = new THREE.EdgesGeometry(cardGeo);
    const backTexture = makeRoundedCardTexture("back");

    function createCard(index) {
      const group = new THREE.Group();
      group.userData.index = index;

      const baseMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        map: backTexture,
        roughness: 0.28,
        metalness: 0.22,
        emissive: 0x21114d,
        emissiveIntensity: 0.18
      });
      const mesh = new THREE.Mesh(cardGeo, baseMat);
      group.add(mesh);

      const edgeMat = new THREE.LineBasicMaterial({ color: 0xb78cff, transparent: true, opacity: 0.28 });
      const edges = new THREE.LineSegments(edgeGeo, edgeMat);
      group.add(edges);

      const glowGeo = new THREE.PlaneGeometry(CARD_W * 1.4, CARD_H * 1.4);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xb78cff,
        transparent: true,
        opacity: 0,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const glowPlane = new THREE.Mesh(glowGeo, glowMat);
      glowPlane.position.z = -0.04;
      group.add(glowPlane);

      const angle = index / CARD_COUNT * Math.PI * 2;
      group.userData.baseAngle = angle;
      group.userData.mesh = mesh;
      group.userData.edges = edges;
      group.userData.edgeMat = edgeMat;
      group.userData.baseMat = baseMat;
      group.userData.glowMat = glowMat;
      group.userData.glowPlane = glowPlane;
      deckGroup.add(group);
      cards.push(group);
    }

    for (let i = 0; i < CARD_COUNT; i++) createCard(i);

    const particleCount = 4600;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleTargets = new Float32Array(particleCount * 3);
    const particleSeeds = new Float32Array(particleCount * 4);
    const particleColors = new Float32Array(particleCount * 3);

    const colorGold = new THREE.Color(0xf1d68a);
    const colorPurple = new THREE.Color(0xb78cff);
    const colorPink = new THREE.Color(0xff81d8);
    const colorWhite = new THREE.Color(0xf5efff);

    for (let i = 0; i < particleCount; i++) {
      particleSeeds[i * 4] = Math.random();
      particleSeeds[i * 4 + 1] = Math.random();
      particleSeeds[i * 4 + 2] = Math.random();
      particleSeeds[i * 4 + 3] = Math.random();
      const p = getParticleTarget(i, "cosmos", 0);
      particlePositions[i * 3] = p.x;
      particlePositions[i * 3 + 1] = p.y;
      particlePositions[i * 3 + 2] = p.z;
      particleTargets[i * 3] = p.x;
      particleTargets[i * 3 + 1] = p.y;
      particleTargets[i * 3 + 2] = p.z;

      const t = particleSeeds[i * 4 + 3];
      const c = new THREE.Color();
      if (t < 0.3) c.lerpColors(colorPurple, colorGold, t / 0.3);
      else if (t < 0.6) c.lerpColors(colorGold, colorPink, (t - 0.3) / 0.3);
      else c.lerpColors(colorPink, colorWhite, (t - 0.6) / 0.4);
      particleColors[i * 3] = c.r;
      particleColors[i * 3 + 1] = c.g;
      particleColors[i * 3 + 2] = c.b;
    }

    particleGeo.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
    particleGeo.setAttribute("color", new THREE.BufferAttribute(particleColors, 3));
    particleGeo.setDrawRange(0, appState.activeParticles);
    const particleMat = new THREE.PointsMaterial({
      size: 0.052,
      transparent: true,
      opacity: 0.9,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    const constellationCount = 300;
    const constellationPositions = new Float32Array(constellationCount * 6);
    const constellationGeo = new THREE.BufferGeometry();
    constellationGeo.setAttribute("position", new THREE.BufferAttribute(constellationPositions, 3));
    constellationGeo.setDrawRange(0, 0);
    const constellationMat = new THREE.LineBasicMaterial({
      color: 0xb78cff,
      transparent: true,
      opacity: 0.12,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const constellationLines = new THREE.LineSegments(constellationGeo, constellationMat);
    scene.add(constellationLines);

    const starfieldCount = 800;
    const starfieldGeo = new THREE.BufferGeometry();
    const starfieldPositions = new Float32Array(starfieldCount * 3);
    const starfieldSizes = new Float32Array(starfieldCount);
    const starfieldPhases = new Float32Array(starfieldCount);
    for (let i = 0; i < starfieldCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 30 + Math.random() * 40;
      starfieldPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starfieldPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.6;
      starfieldPositions[i * 3 + 2] = r * Math.cos(phi);
      starfieldSizes[i] = 0.8 + Math.random() * 2.2;
      starfieldPhases[i] = Math.random() * Math.PI * 2;
    }
    starfieldGeo.setAttribute("position", new THREE.BufferAttribute(starfieldPositions, 3));
    const starfieldMat = new THREE.PointsMaterial({
      color: 0xf5efff,
      size: 0.08,
      transparent: true,
      opacity: 0.5,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const starfield = new THREE.Points(starfieldGeo, starfieldMat);
    scene.add(starfield);

    function applyRenderProfile(name) {
      const next = profiles[name] || profiles.visual;
      appState.renderProfile = name;
      appState.activeParticles = next.activeParticles;
      renderer.setPixelRatio(next.pixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      particleGeo.setDrawRange(0, appState.activeParticles);
      particleMat.size = next.pointSize;
      particleMat.opacity = next.opacityBase;
    }

    function getParticleTarget(i, mode, t) {
      const a = particleSeeds[i * 4] * Math.PI * 2;
      const b = particleSeeds[i * 4 + 1];
      const c = particleSeeds[i * 4 + 2];
      const d = particleSeeds[i * 4 + 3];

      if (mode === "circle") {
        const ring = Math.floor(b * 8);
        const r = 1.4 + ring * 0.55 + Math.sin(a * 9 + t * 1.2) * 0.06;
        return {
          x: Math.cos(a) * r,
          y: -0.9 + ring * 0.08 + Math.sin(a * 14 + t) * 0.07,
          z: Math.sin(a) * r
        };
      }

      if (mode === "vortex") {
        const height = (b - 0.5) * 6.6;
        const twist = a + height * 2.45 + t * 0.9;
        const r = 0.65 + c * 4.4 + Math.sin(t * 1.2 + c * 14) * 0.18;
        return {
          x: Math.cos(twist) * r,
          y: height,
          z: Math.sin(twist) * r
        };
      }

      if (mode === "cosmos") {
        const lane = d < 0.34 ? "nebula" : d < 0.67 ? "vortex" : "circle";
        return getParticleTarget(i, lane, t);
      }

      const theta = a + t * (0.12 + d * 0.12);
      const phi = Math.acos(2 * b - 1);
      const r = 3.1 + c * 4.9 + Math.sin(t * 0.9 + a * 5) * 0.16;
      return {
        x: r * Math.sin(phi) * Math.cos(theta),
        y: r * Math.cos(phi) * 0.9,
        z: r * Math.sin(phi) * Math.sin(theta)
      };
    }

    function updateParticleTargets(mode, time) {
      for (let i = 0; i < appState.activeParticles; i++) {
        const p = getParticleTarget(i, mode, time);
        particleTargets[i * 3] = p.x;
        particleTargets[i * 3 + 1] = p.y;
        particleTargets[i * 3 + 2] = p.z;
      }
    }

    function disposeCardTextureIfNeeded(mat) {
      if (mat && mat.map && mat.map !== backTexture) mat.map.dispose();
    }

    function setTheme(hex) {
      appState.theme.set(hex);
      ambientLight.color.copy(appState.theme);
      sideLight.color.copy(appState.theme);
      document.documentElement.style.setProperty("--theme", hex);
      document.documentElement.style.setProperty("--theme-soft", hexToRgba(hex, .22));
      for (const c of cards) c.userData.edgeMat.color.copy(appState.theme);
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function shuffleDeck() {
      if (appState.shuffling) return Promise.resolve();
      appState.shuffling = true;
      const duration = 2.0;

      return new Promise(resolve => {
        const tl = gsap.timeline({
          onComplete: () => {
            appState.shuffling = false;
            resolve();
          }
        });

      cards.forEach((card, i) => {
        const stagger = i * 0.02;
        const randAngle = Math.random() * Math.PI * 2;
        const scatterDist = 2.5 + Math.random() * 4.5;
        const scatterX = Math.sin(randAngle) * scatterDist;
        const scatterZ = Math.cos(randAngle) * scatterDist - 2;
        const scatterY = (Math.random() - 0.3) * 3.5 + 0.5;

        tl.to(card.position, {
          x: scatterX,
          y: scatterY,
          z: scatterZ,
          duration: duration * 0.35,
          ease: "power2.out"
        }, stagger);

        tl.to(card.rotation, {
          x: (Math.random() - 0.5) * 0.8,
          z: (Math.random() - 0.5) * 1.2,
          duration: duration * 0.35,
          ease: "power2.out"
        }, stagger);

        tl.to(card.scale, {
          x: 1.06, y: 1.06, z: 1.06,
          duration: duration * 0.25,
          ease: "power2.inOut"
        }, stagger);
      });

      const shufflePasses = 2;
      for (let s = 0; s < shufflePasses; s++) {
        const passTime = duration * (0.3 + s * 0.18);
        cards.forEach((card, i) => {
          const randAngle = Math.random() * Math.PI * 2;
          const dist = 1.5 + Math.random() * 5;
          const tx = Math.sin(randAngle) * dist;
          const tz = Math.cos(randAngle) * dist - 1.5;
          const ty = (Math.random() - 0.3) * 3 + 0.8;

          tl.to(card.position, {
            x: tx, y: ty, z: tz,
            duration: duration * 0.13,
            ease: "power1.inOut"
          }, passTime + i * 0.008);

          tl.to(card.rotation, {
            y: Math.random() * Math.PI * 2,
            duration: duration * 0.13,
            ease: "power1.inOut"
          }, passTime + i * 0.008);
        });
      }

      const returnTime = duration * 0.62;
      cards.forEach((card, i) => {
        const returnStagger = i * 0.018;
        const a = card.userData.baseAngle + appState.deckRotation;
        const spiral = (i - CARD_COUNT / 2) * 0.025;
        const targetX = Math.sin(a) * RADIUS;
        const targetZ = Math.cos(a) * RADIUS;
        const targetY = Math.sin(a * 2.0) * 0.12 + spiral;

        tl.to(card.position, {
          x: targetX,
          y: targetY,
          z: targetZ,
          duration: duration * 0.32,
          ease: "power3.inOut"
        }, returnTime + returnStagger);

        tl.to(card.rotation, {
          x: 0,
          y: a + Math.PI,
          z: Math.sin(a) * 0.06,
          duration: duration * 0.32,
          ease: "power3.inOut"
        }, returnTime + returnStagger);

        tl.to(card.scale, {
          x: 1.0, y: 1.0, z: 1.0,
          duration: duration * 0.28,
          ease: "power2.inOut"
        }, returnTime + returnStagger);
      });

      });
    }

    function layoutCards(dt) {
      if (appState.shuffling) return;
      if (appState.manualMode) {
        appState.deckRotation = appState.targetDeckRotation;
      } else {
        const lerp = 1 - Math.pow(0.0001, dt);
        appState.deckRotation += (appState.targetDeckRotation - appState.deckRotation) * lerp;
      }

      if (!appState.drawn) {
        let bestIndex = 0;
        let bestZ = -Infinity;
        for (let i = 0; i < cards.length; i++) {
          const group = cards[i];
          const a = group.userData.baseAngle + appState.deckRotation;
          const spiral = (i - CARD_COUNT / 2) * 0.025;
          const x = Math.sin(a) * RADIUS;
          const z = Math.cos(a) * RADIUS;
          const y = Math.sin(a * 2.0) * 0.12 + spiral;

          group.position.set(x, y, z);
          group.rotation.set(0, a + Math.PI, Math.sin(a) * 0.06);

          const isFrontCandidate = z > bestZ;
          if (isFrontCandidate) {
            bestZ = z;
            bestIndex = i;
          }
        }
        appState.highlightedIndex = bestIndex;
      }

      if (appState.drawn) return;

      for (let i = 0; i < cards.length; i++) {
        const group = cards[i];
        const hot = i === appState.highlightedIndex;
        const targetScale = hot ? 1.12 : 1.0;
        group.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.13);
        group.userData.baseMat.emissiveIntensity += ((hot ? 0.45 : 0.16) - group.userData.baseMat.emissiveIntensity) * 0.12;
        group.userData.edgeMat.opacity += ((hot ? 0.55 : 0.24) - group.userData.edgeMat.opacity) * 0.12;

        const glowTarget = hot ? 0.10 : 0;
        group.userData.glowMat.opacity += (glowTarget - group.userData.glowMat.opacity) * 0.1;

        if (hot) {
          group.position.y += 0.32;
          group.userData.glowMat.color.setHex(0xb78cff);
          group.userData.glowMat.opacity = 0.10 + Math.sin(performance.now() / 1000 * 3) * 0.04;
        }
      }
    }

    function animateParticles(time) {
      if (!appState.drawn) updateParticleTargets(appState.particleMode, time);
      const profile = profiles[appState.renderProfile] || profiles.visual;
      const pos = particleGeo.attributes.position.array;
      for (let i = 0; i < appState.activeParticles; i++) {
        const idx = i * 3;
        pos[idx] += (particleTargets[idx] - pos[idx]) * profile.particleLerp;
        pos[idx + 1] += (particleTargets[idx + 1] - pos[idx + 1]) * profile.particleLerp;
        pos[idx + 2] += (particleTargets[idx + 2] - pos[idx + 2]) * profile.particleLerp;
      }
      particleGeo.attributes.position.needsUpdate = true;
      particleMat.size = profile.pointSize + Math.sin(time * 2.3) * profile.pointPulse;
      particleMat.opacity = profile.opacityBase + Math.sin(time * 1.7) * profile.opacityPulse;
      particles.rotation.y = time * (appState.renderProfile === "gestureLite" ? 0.035 : 0.075);
      particles.rotation.x = Math.sin(time * 0.21) * (appState.renderProfile === "gestureLite" ? 0.06 : 0.16);

      updateConstellationLines();
      animateStarfield(time);
    }

    function updateConstellationLines() {
      const pos = particleGeo.attributes.position.array;
      const cPos = constellationGeo.attributes.position.array;
      let lineCount = 0;
      const maxDist = 1.2;
      const maxDistSq = maxDist * maxDist;
      const checkCount = Math.min(appState.activeParticles, 120);
      const step = Math.max(1, Math.floor(appState.activeParticles / checkCount));

      for (let i = 0; i < checkCount && lineCount < constellationCount; i += step) {
        const idx = i * 3;
        const ax = pos[idx], ay = pos[idx + 1], az = pos[idx + 2];
        for (let j = i + step; j < checkCount && lineCount < constellationCount; j += step) {
          const jdx = j * 3;
          const dx = ax - pos[jdx], dy = ay - pos[jdx + 1], dz = az - pos[jdx + 2];
          const dSq = dx * dx + dy * dy + dz * dz;
          if (dSq < maxDistSq) {
            const li = lineCount * 6;
            cPos[li] = ax; cPos[li + 1] = ay; cPos[li + 2] = az;
            cPos[li + 3] = pos[jdx]; cPos[li + 4] = pos[jdx + 1]; cPos[li + 5] = pos[jdx + 2];
            lineCount++;
          }
        }
      }
      constellationGeo.setDrawRange(0, lineCount * 2);
      constellationGeo.attributes.position.needsUpdate = true;
    }

    function animateStarfield(time) {
      starfieldMat.opacity = 0.35 + Math.sin(time * 0.3) * 0.12;
      starfield.rotation.y = time * 0.008;
      starfield.rotation.x = Math.sin(time * 0.05) * 0.04;
    }

    function scatterOtherCards(selected) {
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card === selected) continue;
        const world = new THREE.Vector3();
        card.getWorldPosition(world);
        const base = i * 170;
        for (let k = 0; k < 170 && base + k < appState.activeParticles; k++) {
          const pIndex = base + k;
          particlePositions[pIndex * 3] = world.x + (Math.random() - .5) * .5;
          particlePositions[pIndex * 3 + 1] = world.y + (Math.random() - .5) * .5;
          particlePositions[pIndex * 3 + 2] = world.z + (Math.random() - .5) * .5;
          const out = world.clone().normalize().multiplyScalar(7 + Math.random() * 6);
          const spread = 6 + Math.random() * 4;
          particleTargets[pIndex * 3] = out.x + (Math.random() - .5) * spread;
          particleTargets[pIndex * 3 + 1] = out.y + (Math.random() - .5) * spread;
          particleTargets[pIndex * 3 + 2] = out.z + (Math.random() - .5) * spread;
        }
        gsap.to(card.scale, { x: 0.01, y: 0.01, z: 0.01, duration: 0.35, ease: "power2.in" });
        gsap.to(card.rotation, { x: card.rotation.x + Math.random() * 4, y: card.rotation.y + Math.random() * 4, duration: 0.4 });
        if (card.userData.glowMat) {
          card.userData.glowMat.opacity = 0.3;
          gsap.to(card.userData.glowMat, { opacity: 0, duration: 0.35 });
        }
      }
      particleGeo.attributes.position.needsUpdate = true;
    }

    function drawSelectedCard() {
      if (appState.drawn) return;
      appState.drawn = true;
      updatePhase("drawn");
      setStatus("抽卡完成，正在翻开牌面", true);

      playFlipSweep();
      document.getElementById("screenFlash").classList.add("active");
      setTimeout(() => document.getElementById("screenFlash").classList.remove("active"), 900);

      const selected = cards[appState.highlightedIndex];
      const tarot = pickTarot();
      const isReversed = tarot.reversed;
      const cardIdx = tarotDeck.findIndex(c => c.name === tarot.name);
      appState.chosenCardName = tarot.name;
      const frontTexture = makeRoundedCardTexture("front", tarot, cardIdx, isReversed);
      disposeCardTextureIfNeeded(selected.userData.baseMat);
      selected.userData.baseMat.map = frontTexture;
      selected.userData.baseMat.emissive.set(0xf1d68a);
      selected.userData.baseMat.emissiveIntensity = 0.14;
      selected.userData.baseMat.needsUpdate = true;

      selected.userData.glowMat.color.set(0xf1d68a);
      selected.userData.glowMat.opacity = 0.22;

      scatterOtherCards(selected);
      deckGroup.remove(selected);
      scene.add(selected);

      const startWorld = new THREE.Vector3();
      selected.getWorldPosition(startWorld);
      selected.position.copy(startWorld);
      selected.rotation.set(0, 0, 0);
      selected.scale.set(1.18, 1.18, 1.18);

      const cardIcon = document.getElementById("resultCardIcon");
      const sym = arcanaSymbols[tarot.name];
      const numeral = romanNumerals[cardIdx >= 0 ? cardIdx : 0];
      if (cardIcon) {
        cardIcon.innerHTML = `<span class="result-card-numeral">${numeral}</span><span class="result-card-symbol">${sym || "✦"}</span>`;
      }

      keyLight.intensity = 2.8;
      rimLight.intensity = 1.5;
      gsap.to(keyLight, { intensity: 1.2, duration: 1.5, ease: "power2.out" });
      gsap.to(rimLight, { intensity: 0.6, duration: 1.5, ease: "power2.out" });

      gsap.timeline()
        .to(selected.position, { x: 0, y: 0.42, z: 2.9, duration: 0.85, ease: "power3.inOut" }, 0)
        .to(selected.scale, { x: 1.72, y: 1.72, z: 1.72, duration: 0.85, ease: "power3.inOut" }, 0)
        .to(selected.userData.glowMat, { opacity: 0.35, duration: 0.4, ease: "power2.out" }, 0)
        .to(selected.rotation, { y: isReversed ? Math.PI * 3 : Math.PI * 2, z: 0, duration: 1.1, ease: "power2.inOut" }, 0.28)
        .to(selected.userData.glowMat, { opacity: 0.15, duration: 0.6, ease: "power2.inOut" }, 0.6)
        .to(selected.position, { x: 0, y: 0.12, z: 4.5, duration: 0.88, ease: "expo.out" }, 1.1)
        .to(selected.scale, { x: 2.4, y: 2.4, z: 2.4, duration: 0.88, ease: "expo.out" }, 1.1)
        .to(selected.userData.glowMat, { opacity: 0.18, duration: 0.5, ease: "sine.inOut" }, 1.4)
        .to(selected.rotation, { z: 0.022, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.7)
        .to(selected.userData.glowMat, { opacity: 0, duration: 0.8, ease: "power2.in" }, 2.0)
        .call(() => {
          document.getElementById("mysticFrame").classList.add("visible");
          showResult(tarot);
        }, null, 2.3);

      burstParticlesAtCard(selected);
    }

    function burstParticlesAtCard(card) {
      const world = new THREE.Vector3();
      card.getWorldPosition(world);
      const pos = particleGeo.attributes.position.array;
      for (let i = 0; i < appState.activeParticles; i++) {
        const idx = i * 3;
        const dx = pos[idx] - world.x;
        const dy = pos[idx + 1] - world.y;
        const dz = pos[idx + 2] - world.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 3) {
          const angle = Math.atan2(dz, dx);
          const force = (3 - dist) * 2.5;
          particleTargets[idx] = pos[idx] + Math.cos(angle) * force + (Math.random() - 0.5) * 2;
          particleTargets[idx + 1] = pos[idx + 1] + Math.random() * force * 0.8;
          particleTargets[idx + 2] = pos[idx + 2] + Math.sin(angle) * force + (Math.random() - 0.5) * 2;
        }
      }
    }

    function pickTarot() {
      const idx = Math.floor(Math.random() * tarotDeck.length);
      const card = tarotDeck[idx];
      const isReversed = Math.random() < 0.5;
      return { ...card, reversed: isReversed, displayMeaning: isReversed ? card.reversed : card.meaning };
    }

    function dailyHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h + str.charCodeAt(i)) | 0;
      }
      return Math.abs(h);
    }

    function getDailyCard() {
      const today = new Date().toISOString().slice(0, 10);
      const cacheKey = "dailyCard_" + today;
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        try { return JSON.parse(cached); } catch (_) {}
      }
      const hash = dailyHash(today);
      const idx = hash % tarotDeck.length;
      const card = tarotDeck[idx];
      const isReversed = (hash >> 8) % 2 === 0;
      const reading = buildReading(card);
      const result = {
        date: today,
        name: card.name,
        reversed: isReversed,
        displayMeaning: isReversed ? card.reversed : card.meaning,
        keyword: isReversed ? "逆位 · " + reading.keyword.split("·").pop().trim() : "正位 · " + reading.keyword.split("·").pop().trim(),
        action: reading.action
      };
      localStorage.setItem(cacheKey, JSON.stringify(result));
      return result;
    }

    function showDailyCard() {
      const daily = getDailyCard();
      const el = document.getElementById("dailyCard");
      document.getElementById("dailyName").textContent = daily.name;
      const dirEl = document.getElementById("dailyDir");
      if (daily.reversed) {
        dirEl.innerHTML = '<span style="color:#ff6bba">⬇ 逆位</span>';
      } else {
        dirEl.innerHTML = '<span style="color:var(--gold)">⬆ 正位</span>';
      }
      document.getElementById("dailyMeaning").textContent = daily.displayMeaning;
      document.getElementById("dailyKeyword").textContent = daily.keyword;
      document.getElementById("dailyAction").textContent = daily.action;
      el.style.display = "";
    }

      const innerM = 16;

      const cornerLen = 36;
      const corners = [
        [frameMargin + innerM, frameTop + innerM],

      corners.forEach(([cx, cy], idx) => {

        ctx.moveTo(cx + cornerLen * dx, cy);

        ctx.lineTo(cx, cy + cornerLen * dy);
        ctx.stroke();
      });

      ctx.strokeStyle = "rgba(241,214,138,0.22)";

      const dirText = tarot.reversed ? "⬇ 逆位" : "⬆ 正位";

      });

      ctx.fillStyle = "rgba(245,239,255,0.6)";
      ctx.font = "400 24px ui-sans-serif, system-ui, sans-serif";
      const kwText = positionLabels.slice(0, drawnCards.length).map((label, i) => {
        return label + " · " + keywords[i];
      }).join("    ");
      const kwLines = wrapText(ctx, kwText, W - 220);
      kwLines.forEach((line, i) => {
        ctx.fillText(line, W / 2, summaryY + 100 + i * 38);
      });

      const lastReading = buildReading(drawnCards[drawnCards.length - 1]);
      ctx.fillStyle = "rgba(245,239,255,0.38)";
      ctx.font = "400 22px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText(lastReading.action, W / 2, summaryY + 100 + kwLines.length * 38 + 40);

      const bottomDecoY = H * 0.85;
      const lineGrad3 = ctx.createLinearGradient(W * 0.15, 0, W * 0.5, 0);
      lineGrad3.addColorStop(0, "transparent");
      lineGrad3.addColorStop(1, "rgba(241,214,138,0.25)");
      ctx.strokeStyle = lineGrad3;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(W * 0.15, bottomDecoY);
      ctx.lineTo(W * 0.46, bottomDecoY);
      ctx.stroke();

      const lineGrad4 = ctx.createLinearGradient(W * 0.5, 0, W * 0.85, 0);
      lineGrad4.addColorStop(0, "rgba(241,214,138,0.25)");
      lineGrad4.addColorStop(1, "transparent");
      ctx.strokeStyle = lineGrad4;
      ctx.beginPath();
      ctx.moveTo(W * 0.54, bottomDecoY);
      ctx.lineTo(W * 0.85, bottomDecoY);
      ctx.stroke();

      ctx.save();
      ctx.translate(W / 2, bottomDecoY);
      ctx.rotate(Math.PI / 4);
      ctx.strokeStyle = "rgba(241,214,138,0.35)";
      ctx.lineWidth = 1;
      ctx.strokeRect(-5, -5, 10, 10);
      ctx.restore();

      const lineGrad5 = ctx.createLinearGradient(W * 0.15, 0, W * 0.5, 0);
      lineGrad5.addColorStop(0, "transparent");
      lineGrad5.addColorStop(1, "rgba(241,214,138,0.12)");
      ctx.strokeStyle = lineGrad5;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(W * 0.18, bottomDecoY + 10);
      ctx.lineTo(W * 0.47, bottomDecoY + 10);
      ctx.stroke();

      const lineGrad6 = ctx.createLinearGradient(W * 0.5, 0, W * 0.85, 0);
      lineGrad6.addColorStop(0, "rgba(241,214,138,0.12)");
      lineGrad6.addColorStop(1, "transparent");
      ctx.strokeStyle = lineGrad6;
      ctx.beginPath();
      ctx.moveTo(W * 0.53, bottomDecoY + 10);
      ctx.lineTo(W * 0.82, bottomDecoY + 10);
      ctx.stroke();

      ctx.fillStyle = "rgba(245,239,255,0.4)";
      ctx.font = "700 28px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("星 门 塔 罗", W / 2, H * 0.89);

      ctx.fillStyle = "rgba(245,239,255,0.18)";
      ctx.font = "400 20px ui-sans-serif, system-ui, sans-serif";
      const dateStr = new Date().toISOString().slice(0, 10);
      ctx.fillText(dateStr, W / 2, H * 0.89 + 38);

      return canvas;
    }

    function wrapText(ctx, text, maxWidth) {
      const chars = text.split("");
      const lines = [];
      let line = "";
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function buildReading(tarot) {
      const keywordMap = {
        "愚者": "开始 / 试错 / 保持轻盈",
        "魔术师": "资源 / 执行 / 主动组合",
        "女祭司": "直觉 / 暂停 / 隐藏信息",
        "女皇": "滋养 / 生长 / 耐心",
        "皇帝": "边界 / 规则 / 责任",
        "教皇": "经验 / 指引 / 传统路径",
        "恋人": "选择 / 价值排序 / 关系",
        "战车": "方向 / 纪律 / 推进",
        "力量": "温和 / 自控 / 长期主义",
        "隐者": "独处 / 复盘 / 看清",
        "命运之轮": "变化 / 时机 / 窗口",
        "正义": "事实 / 后果 / 公平",
        "倒吊人": "换角度 / 停顿 / 松手",
        "死神": "结束 / 转场 / 新空间",
        "节制": "调和 / 节奏 / 平衡",
        "恶魔": "依赖 / 消耗 / 松绑",
        "高塔": "破局 / 暴露问题 / 重建",
        "星星": "希望 / 恢复 / 重新相信",
        "月亮": "情绪 / 投射 / 不确定",
        "太阳": "坦诚 / 明亮 / 简单",
        "审判": "评估 / 唤醒 / 重新选择",
        "世界": "完成 / 收束 / 下一阶段"
      };
      const actions = [
        "把问题拆成一个今天能完成的小动作，先别追求完美答案。",
        "给自己十分钟写下事实、猜测和情绪，把三者分开看。",
        "找一个可信的人复述你的判断，看看哪里还站不稳。",
        "先暂停一次冲动选择，让明天的自己再确认。",
        "把最消耗你的环节减掉一点，把最有效的环节重复一次。"
      ];
      const seed = Math.abs((tarot.name.charCodeAt(0) || 0) + appState.highlightedIndex);
      return {
        keyword: keywordMap[tarot.name] || "观察 / 选择 / 行动",
        action: actions[seed % actions.length]
      };
    }

    function showResult(tarot) {
      const reading = buildReading(tarot);
      const isReversed = tarot.reversed;
      const cardIdx = tarotDeck.findIndex(c => c.name === tarot.name);
      const numeral = romanNumerals[cardIdx >= 0 ? cardIdx : 0];
      const originalCard = cardIdx >= 0 ? tarotDeck[cardIdx] : null;
      document.getElementById("resultTitle").innerHTML = tarot.name +
        (isReversed ? ' <span style="font-size:0.6em;color:#ff6bba;letter-spacing:0">⬇ 逆位</span>' : ' <span style="font-size:0.6em;color:var(--gold);letter-spacing:0">⬆ 正位</span>');
      document.getElementById("resultQuestion").textContent = `你的问题：${appState.userQuestion || "那个还没有说出口的问题"}`;
      document.getElementById("resultAnswer").textContent = tarot.displayMeaning || tarot.meaning;
      document.getElementById("resultKeyword").textContent = reading.keyword;
      document.getElementById("resultAction").textContent = reading.action;
      const subtitle = document.getElementById("resultCardSubtitle");
      if (subtitle) subtitle.textContent = `${numeral} · ${isReversed ? "逆位" : "正位"}`;
      const brief = document.getElementById("resultCardBrief");
      if (brief) {
        const fullMeaning = tarot.meaning || "";
        const firstSentence = fullMeaning.split(/。/)[0] || "";
        const reversedText = originalCard ? originalCard.reversed : "";
        brief.textContent = isReversed ? (reversedText || reading.keyword) : (firstSentence || reading.keyword);
      }
      document.getElementById("resultBox").classList.add("show");
      setStatus("仪式完成，点击「新牌阵」开启下一轮占卜", true);
      appState.currentTarot = tarot;
      appState.drawnCards.push({ name: tarot.name, reversed: tarot.reversed, meaning: tarot.displayMeaning || tarot.meaning });
      updateSpreadButtons();
    }

      for (const card of cards) {
        gsap.killTweensOf(card.position);
        gsap.killTweensOf(card.rotation);
        gsap.killTweensOf(card.scale);
        if (card.userData.glowMat) {
          gsap.killTweensOf(card.userData.glowMat);
          card.userData.glowMat.opacity = 0;
        }
        if (card.parent !== deckGroup) {
          if (card.parent) card.parent.remove(card);
          deckGroup.add(card);
        }
        disposeCardTextureIfNeeded(card.userData.baseMat);
        card.userData.baseMat.map = backTexture;
        card.userData.baseMat.emissive.set(0x21114d);
        card.userData.baseMat.emissiveIntensity = 0.18;
        card.userData.baseMat.needsUpdate = true;
        card.userData.edgeMat.opacity = 0.28;

      deckGroup.scale.set(1, 1, 1);

      updatePhase("waitingOpen");

    let prevTime = performance.now();
    function renderLoop(now) {
      const dt = Math.min((now - prevTime) / 1000, 0.05);
      prevTime = now;
      const t = now / 1000;

      if (!appState.started && !appState.drawn) {
        appState.targetDeckRotation += dt * 0.22;
      }

      deckGroup.rotation.y = 0;
      deckGroup.rotation.x = Math.sin(t * 0.4) * 0.035;
      deckGroup.rotation.z += (appState.targetDeckTilt - deckGroup.rotation.z) * 0.08;
      layoutCards(dt);
      animateParticles(t);
      updateMagicCircle(t);

      const handEase = appState.renderProfile === "gestureLite" ? 0.1 : (appState.manualMode ? 0.2 : 0.14);
      appState.handX += (appState.handTargetX - appState.handX) * handEase;
      appState.targetDeckRotation = (0.5 - appState.handX) * Math.PI * 2.15;
      camera.position.x += ((appState.handX - 0.5) * 0.55 - camera.position.x) * 0.035;
      camera.position.y = 1.7 + Math.sin(t * 0.28) * 0.06;
      camera.lookAt(0, 0.35, 0);

      rimLight.position.x = 3 + Math.sin(t * 0.6) * 1.5;
      rimLight.position.z = 4 + Math.cos(t * 0.4) * 1;
      fillLight.intensity = 0.4 + Math.sin(t * 0.8) * 0.15;

      renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);
