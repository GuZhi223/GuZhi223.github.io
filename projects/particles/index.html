      appState.touchStartX = 0;
      appState.touchStartY = 0;
      appState.touchStartTime = 0;
      appState.touchIsTap = false;
      appState.touchDeadzonePassed = false;
      appState.magicCircle = { active: false, history: [], circleCount: 0, lastCircleTime: 0, rotation: 0, targetRotation: 0 };
      const focusRingEl = document.getElementById("fistFocusRing");
      if (focusRingEl) focusRingEl.classList.remove("visible");
      document.querySelectorAll('body > div[style*="z-index:9999"], body > div[style*="z-index:9998"]').forEach(el => {
        gsap.killTweensOf(el);
        el.remove();
      });
      const spreadShareActions = document.getElementById("spreadShareActions");
      if (spreadShareActions) spreadShareActions.remove();
      appState.targetDeckRotation = 0;
      appState.particleMode = "cosmos";
      appState.magicCircle = { active: false, history: [], circleCount: 0, lastCircleTime: 0, rotation: 0, targetRotation: 0 };
      applyRenderProfile("visual");
      updatePhase("waitingOpen");
      setStatus(appState.cameraReady ? "摄像头保持开启，写下新问题即可继续" : "等待开始感知", appState.cameraReady);

      for (const card of cards) {
        gsap.killTweensOf(card.position);
        gsap.killTweensOf(card.rotation);
        gsap.killTweensOf(card.scale);
        if (card.userData.glowMat) {
          gsap.killTweensOf(card.userData.glowMat);
          card.userData.glowMat.opacity = 0;
        }
        if (card.parent !== deckGroup) {
          if (card.parent) card.parent.remove(card);
          deckGroup.add(card);
        }
        disposeCardTextureIfNeeded(card.userData.baseMat);
        card.userData.baseMat.map = backTexture;
        card.userData.baseMat.emissive.set(0x21114d);
        card.userData.baseMat.emissiveIntensity = 0.18;
        card.userData.baseMat.needsUpdate = true;
        card.userData.edgeMat.opacity = 0.28;
        card.scale.set(1, 1, 1);
      }
      deckGroup.scale.set(1, 1, 1);
      constellationGeo.setDrawRange(0, 0);
      updateParticleTargets(appState.particleMode, performance.now() / 1000);
    }

    function updatePhase(phase) {
      document.querySelectorAll(".phase").forEach(item => {
        item.classList.toggle("active", item.dataset.phase === phase);
      });
    }

    function updatePointerSelection(clientX, clientY) {
      if (!appState.started || appState.drawn) return;
      const x = Math.min(Math.max(clientX / window.innerWidth, 0), 1);
      appState.handTargetX += (x - appState.handTargetX) * 0.7;
      const y = Math.min(Math.max(clientY / window.innerHeight, 0), 1);
      appState.handTargetY += (y - appState.handTargetY) * 0.4;
      appState.targetDeckTilt = (0.5 - appState.handTargetY) * 0.5;
      if (appState.manualMode) intensifyParticles();
    }

    canvas.addEventListener("pointerdown", e => {
      appState.touchStartX = e.clientX;
      appState.touchStartY = e.clientY;
      appState.touchStartTime = performance.now();
      appState.touchIsTap = true;
      appState.touchDeadzonePassed = false;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", e => {
      const dx = e.clientX - appState.touchStartX;
      const dy = e.clientY - appState.touchStartY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 15) {
        appState.touchIsTap = false;
      }
      if (!appState.touchDeadzonePassed) {
        if (dist > 8) {
          appState.touchDeadzonePassed = true;
        } else {
          return;
        }
      }
      updatePointerSelection(e.clientX, e.clientY);
    });
    canvas.addEventListener("pointerup", () => {
      if (appState.touchIsTap && (performance.now() - appState.touchStartTime) < 500 && appState.manualMode && appState.started && !appState.drawn && !appState.shuffling) {
        pulseDeck();
        drawSelectedCard();
      }
      appState.touchIsTap = false;
      appState.touchDeadzonePassed = false;
    });

    window.addEventListener("keydown", e => {
      if ((e.key === "Enter" || e.key === " ") && appState.manualMode && !appState.drawn) {
        e.preventDefault();
        pulseDeck();
        drawSelectedCard();
      }
    });

    function setStatus(text, ok) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("statusDot").classList.toggle("on", !!ok);
    }

    const video = document.getElementById("video");
    const handCanvas = document.getElementById("handCanvas");
    const handCtx = handCanvas.getContext("2d");
    let hands = null;
    let processingHands = false;
    let lastHandsSent = 0;
    let handLoopRunning = false;

    function waitForVideoReady(videoEl, timeout = 3500) {
      return new Promise((resolve, reject) => {
        const started = performance.now();
        const check = () => {
          if (videoEl.readyState >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            resolve();
            return;
          }
          if (performance.now() - started > timeout) {
            reject(new Error("video metadata timeout"));
            return;
          }
          requestAnimationFrame(check);
        };
        if (videoEl.readyState >= 1) check();
        else videoEl.addEventListener("loadedmetadata", check, { once: true });
      });
    }

    async function ensureVideoPlaying(videoEl) {
      await waitForVideoReady(videoEl);
      const playPromise = videoEl.play();
      if (playPromise) await playPromise;
      await waitForVideoReady(videoEl);
      if (videoEl.paused || videoEl.readyState < 2) {
        throw new Error("video did not start playing");
      }
    }

    async function startHandTracking() {
      try {
        if (appState.cameraReady && video.srcObject) {
          appState.gesture = "unknown";
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          appState.gesturePhase = "waitingOpen";
          appState.lastGestureChange = performance.now();
          appState.lastPhaseChange = performance.now();
          setStatus("摄像头已就绪，张开手掌开始选牌", true);
          return;
        }
        const videoProfile = isMobileUA
          ? { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 30, max: 30 } }
          : { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 60 } };
        const stream = await navigator.mediaDevices.getUserMedia({
          video: videoProfile,
          audio: false
        });
        video.srcObject = stream;
        video.muted = true;
        video.playsInline = true;
        await ensureVideoPlaying(video);
        handCanvas.width = video.videoWidth || 640;
        handCanvas.height = video.videoHeight || 480;

        if (typeof Hands === "undefined") {
          throw new Error("MediaPipe Hands failed to load");
        }

        hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({
          selfieMode: true,
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.78,
          minTrackingConfidence: 0.72
        });
        hands.onResults(onHandResults);
        appState.cameraReady = true;
        setStatus(isMobileUA ? "轻量手势模式已启动，张开手掌开始选牌" : "摄像头已启动，张开手掌开始选牌", true);
        if (!handLoopRunning) {
          handLoopRunning = true;
          requestAnimationFrame(handLoop);
        }
      } catch (err) {
        console.error(err);
        appState.manualMode = true;
        document.querySelector(".video-wrap").style.display = "none";
        updatePhase("fistSeen");
        const message = err && err.message ? err.message : "";
        if (location.protocol !== "https:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
          setStatus("手机浏览器需要 HTTPS 才能开摄像头，已切换为点击抽牌", false);
        } else if (/MediaPipe|Hands/i.test(message)) {
          setStatus("手势识别资源加载失败，已切换为点击抽牌", false);
        } else if (/metadata|playing/i.test(message)) {
          setStatus("视频流没有正常启动，已切换为点击抽牌", false);
        } else {
          setStatus("摄像头启动失败，已切换为点击抽牌模式", false);
        }
      }
    }

    async function handLoop(now) {
      if (!hands || video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(handLoop);
        return;
      }
      // 控制识别频率，避免和 Three.js 渲染互相抢资源。30FPS 下通常能保持 100ms 内响应。
      if (!processingHands && now - lastHandsSent > 30) {
        processingHands = true;
        lastHandsSent = now;
        try {
          await hands.send({ image: video });
        } catch (e) {
          console.warn(e);
        } finally {
          processingHands = false;
        }
      }
      requestAnimationFrame(handLoop);
    }

    function computeSensitivity(palmZ, speed) {
      const cfg = gestureConfig;
      const rawProximity = Math.max(0, Math.min(1, (palmZ - cfg.depthMin) / (cfg.depthMax - cfg.depthMin)));
      const distanceMultiplier = cfg.minSensitivity + (cfg.maxSensitivity - cfg.minSensitivity) * Math.pow(rawProximity, cfg.powerExponent);

      let velocityBonus = 0;
      if (speed > cfg.velocityThreshold) {
        velocityBonus = cfg.velocityGain * Math.min((speed - cfg.velocityThreshold) / cfg.velocityThreshold, cfg.maxVelocityBonus);
      }

      const rawSensitivity = distanceMultiplier + velocityBonus;
      appState.smoothedSensitivity += (rawSensitivity - appState.smoothedSensitivity) * cfg.sensitivitySmoothing;
      return Math.max(cfg.minSensitivity, Math.min(cfg.maxSensitivity * 1.5, appState.smoothedSensitivity));
    }

    function onHandResults(results) {
      handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        if (performance.now() - appState.lastHandSeen > 800 && appState.started && !appState.drawn) {
          setStatus("未检测到手，请把单手放入画面", false);
        }
        return;
      }

      const lm = results.multiHandLandmarks[0];
      appState.lastHandSeen = performance.now();
      drawHandOverlay(lm);

      const palm = getPalmCenter(lm);
      const mirroredX = 1 - palm.x;
      const moveDelta = mirroredX - appState.handTargetX;

      const now = performance.now();
      const dtSec = appState.handLastMoveTime > 0 ? Math.min((now - appState.handLastMoveTime) / 1000, 0.1) : 0.05;
      const rawSpeed = Math.abs(mirroredX - appState.handPrevX);
      const instantSpeed = dtSec > 0 ? rawSpeed / dtSec : 0;
      appState.handVelocityX = appState.handVelocityX * 0.7 + instantSpeed * 0.3;
      appState.handPrevX = mirroredX;
      appState.handLastMoveTime = now;

      const sensitivity = computeSensitivity(palm.z, appState.handVelocityX);
      appState.handZ = palm.z;

      const dampingAlpha = appState.dampingTarget < appState.currentDamping
        ? gestureConfig.dampingAttack
        : gestureConfig.dampingRelease;
      appState.currentDamping += (appState.dampingTarget - appState.currentDamping) * dampingAlpha;

      const isGestureLite = appState.renderProfile === "gestureLite";
      const baseDeadZone = isGestureLite ? 0.024 : 0.014;
      const baseGain = isGestureLite ? 0.32 : 0.32;
      const baseSettle = isGestureLite ? 0.08 : 0.08;
      const effectiveDeadZone = baseDeadZone / (sensitivity * appState.currentDamping);
      const effectiveGain = baseGain * sensitivity * appState.currentDamping;
      const effectiveSettle = baseSettle * sensitivity * appState.currentDamping;

      if (Math.abs(moveDelta) > effectiveDeadZone) {
        appState.handTargetX += moveDelta * effectiveGain;
      } else {
        appState.handTargetX += moveDelta * effectiveSettle;
      }
      appState.handY = palm.y;
      appState.handTargetY += (palm.y - appState.handTargetY) * 0.3;
      appState.targetDeckTilt = (0.5 - appState.handTargetY) * 0.5;

      const rawGesture = classifyGesture(lm);
      const gesture = smoothGesture(rawGesture);
      updateGestureState(gesture, rawGesture);
    }

    function getPalmCenter(lm) {
      const ids = [0, 5, 9, 13, 17];
      const p = { x: 0, y: 0, z: 0 };
      for (const id of ids) {
        p.x += lm[id].x;
        p.y += lm[id].y;
        p.z += lm[id].z;
      }
      p.x /= ids.length;
      p.y /= ids.length;
      p.z /= ids.length;
      return p;
    }

    function dist(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dz = (a.z || 0) - (b.z || 0);
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function classifyGesture(lm) {
      const palm = getPalmCenter(lm);
      const wrist = lm[0];
      const indexMcp = lm[5];
      const middleMcp = lm[9];
      const ringMcp = lm[13];
      const pinkyMcp = lm[17];

      // 用掌宽 + 掌长做归一化，避免不同人手大小、离摄像头远近导致阈值漂移。
      const palmWidth = Math.max(dist(indexMcp, pinkyMcp), 0.001);
      const palmLength = Math.max(dist(wrist, middleMcp), 0.001);
      const handScale = (palmWidth + palmLength) * 0.5;

      // 四根长手指：如果指尖比 PIP 关节更靠近手腕，通常就是弯曲/握拳。
      const fingers = [
        { tip: 8, pip: 6, mcp: 5 },
        { tip: 12, pip: 10, mcp: 9 },
        { tip: 16, pip: 14, mcp: 13 },
        { tip: 20, pip: 18, mcp: 17 }
      ];

      let bent = 0;
      let open = 0;
      let avgTipPalm = 0;

      for (const f of fingers) {
        const tip = lm[f.tip];
        const pip = lm[f.pip];
        const mcp = lm[f.mcp];

        const tipToWrist = dist(tip, wrist);
        const pipToWrist = dist(pip, wrist);
        const tipToPalm = dist(tip, palm) / handScale;
        avgTipPalm += tipToPalm;

        const isBentByWrist = tipToWrist < pipToWrist + palmLength * 0.04;
        const isBentByPalm = tipToPalm < 1.02;
        const isOpenByPalm = tipToPalm > 1.30 && dist(tip, mcp) > dist(pip, mcp) * 1.06;

        if (isBentByWrist || isBentByPalm) bent++;
        if (isOpenByPalm) open++;
      }

      avgTipPalm /= fingers.length;

      const thumbTipPalm = dist(lm[4], palm) / handScale;
      const thumbTipIndex = dist(lm[4], lm[5]) / handScale;
      const thumbLooksClosed = thumbTipPalm < 1.05 || thumbTipIndex < 0.78;
      const thumbLooksOpen = thumbTipPalm > 1.20 && thumbTipIndex > 0.80;

      if (thumbLooksClosed) bent += 0.6;
      if (thumbLooksOpen) open += 0.5;

      const isFist = bent >= 3.8 && avgTipPalm < 1.10;
      const isOpen = open >= 3.0 && avgTipPalm > 1.22;
      const isOpening = open >= 2.2 && avgTipPalm > 1.14 && bent < 2.8;

      if (isFist) return "fist";
      if (isOpen) return "open";
      if (isOpening) return "opening";
      return "neutral";
    }

    function detectCircle(handX, handY) {
      const mc = appState.magicCircle;
      const now = performance.now();
      mc.history.push({ x: handX, y: handY, t: now });
      if (mc.history.length > 60) mc.history.shift();

      if (mc.history.length < 20) return false;

      const recent = mc.history.slice(-30);
      const cx = recent.reduce((s, p) => s + p.x, 0) / recent.length;
      const cy = recent.reduce((s, p) => s + p.y, 0) / recent.length;
      const avgR = recent.reduce((s, p) => s + Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2), 0) / recent.length;

      if (avgR < 0.03) return false;

      let variance = 0;
      for (const p of recent) {
        const r = Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2);
        variance += (r - avgR) ** 2;
      }
      variance /= recent.length;
      const normalizedVariance = variance / (avgR * avgR);

      if (normalizedVariance > 0.06) return false;

      const t0 = recent[0].t;
      const tLast = recent[recent.length - 1].t;
      const dt = (tLast - t0) / 1000;
      if (dt < 0.6) return false;

      let crossCount = 0;
      let prevAngle = Math.atan2(recent[0].y - cy, recent[0].x - cx);
      for (let i = 1; i < recent.length; i++) {
        const angle = Math.atan2(recent[i].y - cy, recent[i].x - cx);
        if (Math.abs(angle - prevAngle) > Math.PI) crossCount++;
        prevAngle = angle;
      }

      return crossCount >= 1 && dt > 0.8;
    }

    function updateMagicCircle(time) {
      const mc = appState.magicCircle;
      if (!appState.drawn && appState.gesture === "fist") {
        const isCircle = detectCircle(appState.handX, appState.handY * 0.5 + 0.25);
        if (isCircle) {
          if (!mc.active) mc.active = true;
          mc.circleCount++;
          mc.history = [];
          mc.targetRotation += Math.PI * 0.5;
        }
      }

      if (mc.active) {
        mc.rotation += (mc.targetRotation - mc.rotation) * 0.08;
        const pos = particleGeo.attributes.position.array;
        const magicCenter = new THREE.Vector3(0, 0.3, 0);
        const ringCount = 60;
        const ringRadius = 1.8 + Math.sin(time * 2) * 0.15;

        for (let i = 0; i < ringCount; i++) {
          const idx = i;
          const angle = (i / ringCount) * Math.PI * 2 + mc.rotation;
          const tx = magicCenter.x + Math.cos(angle) * ringRadius;
          const ty = magicCenter.y + Math.sin(time * 1.5 + i * 0.3) * 0.1;
          const tz = magicCenter.z + Math.sin(angle) * ringRadius;

          const pIdx = idx * 3;
          pos[pIdx] += (tx - pos[pIdx]) * 0.15;
          pos[pIdx + 1] += (ty - pos[pIdx + 1]) * 0.15;
          pos[pIdx + 2] += (tz - pos[pIdx + 2]) * 0.15;
        }

        for (let ring = 1; ring <= 2; ring++) {
          const r = ringRadius * (0.6 + ring * 0.35);
          const count = 40;
          for (let i = 0; i < count; i++) {
            const idx = 60 + (ring - 1) * count + i;
            if (idx >= appState.activeParticles) break;
            const angle = (i / count) * Math.PI * 2 - mc.rotation * (1 + ring * 0.5);
            const pIdx = idx * 3;
            pos[pIdx] += (magicCenter.x + Math.cos(angle) * r - pos[pIdx]) * 0.12;
            pos[pIdx + 1] += (magicCenter.y + Math.sin(time * 2 + i * 0.5) * 0.06 - pos[pIdx + 1]) * 0.12;
            pos[pIdx + 2] += (magicCenter.z + Math.sin(angle) * r - pos[pIdx + 2]) * 0.12;
          }
        }

        particleGeo.attributes.position.needsUpdate = true;
      }

      if (mc.active && appState.gesture !== "fist") {
        scatterMagicCircle();
        mc.active = false;
        mc.circleCount = 0;
        mc.rotation = 0;
        mc.targetRotation = 0;
        mc.history = [];
      }
    }

    function scatterMagicCircle() {
      const pos = particleGeo.attributes.position.array;
      const magicCenter = new THREE.Vector3(0, 0.3, 0);
      const scatterCount = 140;
      for (let i = 0; i < scatterCount; i++) {
        const idx = i * 3;
        const dx = pos[idx] - magicCenter.x;
        const dy = pos[idx + 1] - magicCenter.y;
        const dz = pos[idx + 2] - magicCenter.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
        const force = 4 + Math.random() * 3;
        particleTargets[idx] = pos[idx] + (dx / dist) * force + (Math.random() - 0.5) * 2;
        particleTargets[idx + 1] = pos[idx + 1] + (dy / dist) * force * 0.5 + Math.random() * 2;
        particleTargets[idx + 2] = pos[idx + 2] + (dz / dist) * force + (Math.random() - 0.5) * 2;
      }
    }

    function smoothGesture(rawGesture) {
      const maxSamples = appState.renderProfile === "gestureLite" ? 7 : 5;
      appState.gestureSamples.push(rawGesture);
      if (appState.gestureSamples.length > maxSamples) appState.gestureSamples.shift();

      const counts = appState.gestureSamples.reduce((acc, item) => {
        acc[item] = (acc[item] || 0) + 1;
        return acc;
      }, {});
      const need = appState.renderProfile === "gestureLite" ? 4 : 3;
      const openVotes = (counts.open || 0) + (counts.opening || 0) * 0.7;
      const openNeed = appState.gesturePhase === "fistSeen" ? 1.4 : need;
      if (openVotes >= openNeed) return "open";
      if ((counts.fist || 0) >= need) return "fist";
      if ((counts.neutral || 0) >= need) return "neutral";
      return appState.gesture;
    }

    function updateGestureState(gesture, rawGesture) {
      if (!appState.started || appState.drawn || appState.shuffling) return;
      const now = performance.now();
      if (appState.gesturePhase === "fistSeen") {
        const releaseSignal = rawGesture === "open" ? 2 : (rawGesture === "opening" || gesture === "open" ? 1 : 0);
        appState.releaseFrames = releaseSignal ? Math.min(appState.releaseFrames + releaseSignal, 3) : 0;
        if (appState.releaseFrames >= 2 && now - appState.lastPhaseChange > 150) {
          appState.gesture = "open";
          appState.lastGestureChange = now;
          appState.lastPhaseChange = now;
          appState.dampingTarget = 1.0;
          drawSelectedCard();
          return;
        }
      }

      if (gesture !== appState.gesture) {
        appState.gesture = gesture;
        appState.lastGestureChange = now;
        return;
      }

      const stableEnough = now - appState.lastGestureChange > 260;
      const phaseReady = now - appState.lastPhaseChange > 420;
      if (!stableEnough || !phaseReady || gesture === "neutral") return;

      if (appState.gesturePhase === "waitingOpen") {
        if (gesture === "open") {
          appState.gesturePhase = "openSeen";
          appState.lastPhaseChange = now;
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          updatePhase("waitingOpen");
          setStatus("已感知张开手掌，握拳抓取当前牌", true);
        } else {
          setStatus("请先张开手掌，让牌堆响应你的位置", true);
        }
        return;
      }

      if (appState.gesturePhase === "openSeen") {
        if (gesture === "fist") {
          appState.gesturePhase = "fistSeen";
          appState.lastPhaseChange = now;
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          appState.dampingTarget = gestureConfig.fistDamping;
          updatePhase("fistSeen");
          pulseDeck();
          setStatus("已握拳，松开手掌完成抽卡", true);
        }
        return;
      }

      if (appState.gesturePhase === "fistSeen") {
        if (gesture === "open") {
          appState.lastPhaseChange = now;
          appState.dampingTarget = 1.0;
          const ring = document.getElementById("fistFocusRing");
          if (ring) ring.classList.remove("visible");
          appState.fistFocusRingVisible = false;
          drawSelectedCard();
        } else if (gesture === "fist") {
          appState.targetDeckRotation += appState.currentDamping < 0.5 ? 0.004 : 0.012;
          intensifyParticles();
          if (!appState.fistFocusRingVisible && now - appState.lastPhaseChange > 500) {
            const ring = document.getElementById("fistFocusRing");
            if (ring) ring.classList.add("visible");
            appState.fistFocusRingVisible = true;
          }
        }
      }
    }

    function pulseDeck() {
      playFistHum();
      gsap.fromTo(deckGroup.scale, { x: 1, y: 1, z: 1 }, { x: .82, y: .82, z: .82, duration: .16, yoyo: true, repeat: 1, ease: "power2.inOut" });
      keyLight.intensity = 4.5;
      rimLight.intensity = 2.8;
      gsap.to(keyLight, { intensity: 1.8, duration: .8, ease: "power2.out" });
      gsap.to(rimLight, { intensity: 0.8, duration: .8, ease: "power2.out" });
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card.userData.glowMat) {
          card.userData.glowMat.opacity = 0.22;
          gsap.to(card.userData.glowMat, { opacity: 0, duration: 0.5, ease: "power2.out" });
        }
      }

      const canvas3d = document.getElementById("threeCanvas");
      if (canvas3d) {
        const rect = canvas3d.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height * 0.55;

        const shockwave = document.createElement("div");
        shockwave.style.cssText = "position:fixed;left:" + cx + "px;top:" + cy + "px;width:0;height:0;border-radius:50%;border:2px solid rgba(241,214,138,0.4);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);";
        document.body.appendChild(shockwave);
        gsap.to(shockwave, { width: 800, height: 800, opacity: 0, borderWidth: 0.5, duration: 0.6, ease: "power2.out", onComplete: () => shockwave.remove() });

        const vignette = document.createElement("div");
        vignette.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center, transparent 40%, rgba(241,214,138,0.12) 70%, rgba(241,214,138,0.25) 100%);opacity:0;";
        document.body.appendChild(vignette);
        gsap.fromTo(vignette, { opacity: 0 }, { opacity: 1, duration: 0.15, yoyo: true, repeat: 1, ease: "power2.inOut", onComplete: () => vignette.remove() });
      }

      const fistPhase = document.querySelector('.phase[data-phase="fistSeen"]');
      if (fistPhase) {
        gsap.fromTo(fistPhase, { scale: 1 }, { scale: 1.15, duration: 0.2, yoyo: true, repeat: 1, ease: "power2.inOut" });
      }
    }

    function intensifyParticles() {
      particleMat.size += (0.088 - particleMat.size) * 0.08;
      particleMat.opacity += (0.98 - particleMat.opacity) * 0.08;
      const contraction = appState.currentDamping < 0.5 ? 0.93 : 0.96;
      for (let i = 0; i < appState.activeParticles; i += 4) {
        particleTargets[i * 3] *= contraction;
        particleTargets[i * 3 + 1] *= contraction;
        particleTargets[i * 3 + 2] *= contraction;
      }
      constellationMat.opacity += (0.22 - constellationMat.opacity) * 0.06;
    }

    function drawHandOverlay(lm) {
      const w = handCanvas.width;
      const h = handCanvas.height;
      handCtx.save();
      handCtx.lineWidth = 3;
      handCtx.strokeStyle = "rgba(183,140,255,.82)";
      handCtx.fillStyle = "rgba(255,255,255,.9)";
      const chains = [
        [0,1,2,3,4], [0,5,6,7,8], [5,9,10,11,12], [9,13,14,15,16], [13,17,18,19,20], [0,17]
      ];
      for (const chain of chains) {
        handCtx.beginPath();
        for (let i = 0; i < chain.length; i++) {
          const p = lm[chain[i]];
          const x = p.x * w;
          const y = p.y * h;
          if (i === 0) handCtx.moveTo(x, y);
          else handCtx.lineTo(x, y);
        }
        handCtx.stroke();
      }
      for (const p of lm) {
        handCtx.beginPath();
        handCtx.arc(p.x * w, p.y * h, 3.2, 0, Math.PI * 2);
        handCtx.fill();
      }
      handCtx.restore();
    }

    window.__gestureConfig = gestureConfig;
    window.__getGestureState = () => ({
      handX: appState.handX,
      handTargetX: appState.handTargetX,
      handZ: appState.handZ,
      handVelocityX: appState.handVelocityX,
      smoothedSensitivity: appState.smoothedSensitivity,
      gesturePhase: appState.gesturePhase,
      gesture: appState.gesture
    });
  </script>
</body>
