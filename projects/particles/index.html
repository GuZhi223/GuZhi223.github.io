<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星门塔罗 | 3D 手势抽牌</title>
  <style>
    :root {
      --theme: #b78cff;
      --theme-soft: rgba(183, 140, 255, 0.22);
      --panel: rgba(18, 14, 35, 0.58);
      --line: rgba(255,255,255,0.16);
      --text: #f5efff;
      --muted: rgba(245,239,255,0.68);
      --gold: #f1d68a;
      --danger: #ff6bba;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(135, 68, 255, 0.28), transparent 32%),
        radial-gradient(circle at 78% 70%, rgba(255, 84, 190, 0.16), transparent 30%),
        linear-gradient(135deg, #03020a 0%, #0a0718 52%, #110820 100%);
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #threeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .grain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0.2;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.28) 1px, transparent 0);
      background-size: 34px 34px;
      mix-blend-mode: screen;
    }

    .vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.52) 100%);
    }

    .intro-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(48, 35, 94, 0.72), rgba(7, 8, 22, 0.88) 72%),
        linear-gradient(135deg, rgba(241,214,138,0.08), rgba(169,139,255,0.10));
      backdrop-filter: blur(10px);
      transition: opacity 1.2s ease, transform 1s ease;
    }

    .intro-modal.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    .intro-card {
      width: min(520px, 90vw);
      border: 1px solid rgba(241, 214, 138, 0.16);
      border-radius: 0;
      padding: 40px;
      background: rgba(18, 13, 36, 0.34);
      box-shadow: 0 24px 90px rgba(0,0,0,0.28), inset 0 0 40px rgba(169,139,255,0.05);
      backdrop-filter: blur(12px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .intro-card::before, .intro-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .intro-card::before {
      inset: 16px;
      border: 1px solid rgba(241,214,138,0.08);
    }

    .intro-card::after {
      left: 24px;
      right: 24px;
      bottom: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(241,214,138,0.35), transparent);
    }

    .sigil {
      width: 60px;
      height: 60px;
      margin: 0 auto 30px;
      border-radius: 0;
      border: 1px solid rgba(241, 214, 138, 0.42);
      background: transparent;
      box-shadow: 0 0 16px rgba(142,110,227,0.12);
      position: relative;
      transform: rotate(45deg);
      animation: breathe 4s ease-in-out infinite alternate;
    }

    .sigil::before, .sigil::after {
      content: "";
      position: absolute;
      border-radius: 0;
    }

    .sigil::before {
      inset: 9px;
      border: 1px solid rgba(142, 110, 227, 0.62);
      transform: rotate(45deg);
    }

    .sigil::after {
      inset: 22px;
      border: 1px solid rgba(241, 214, 138, 0.34);
      background: rgba(241,214,138,0.5);
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 10px rgba(142,110,227,0.12); }
      100% { box-shadow: 0 0 30px rgba(142,110,227,0.42); }
    }

    .intro-card h1 {
      margin: 0 0 20px;
      font-size: clamp(26px, 5vw, 34px);
      letter-spacing: .36em;
      font-weight: 300;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(241, 214, 138, 0.35);
    }

    .intro-card p {
      margin: 0 auto 30px;
      max-width: 430px;
      line-height: 2;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
    }

    textarea {
      width: 100%;
      min-height: 104px;
      resize: none;
      outline: none;
      color: var(--gold);
      font-size: 15px;
      line-height: 1.8;
      padding: 15px 0;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.22);
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      text-align: center;
      font-family: inherit;
      transition: border-color .3s ease, box-shadow .3s ease;
    }

    textarea:focus {
      border-bottom-color: var(--gold);
      box-shadow: 0 18px 26px -28px rgba(241,214,138,.7);
    }

    textarea::placeholder {
      color: rgba(243,236,255,0.38);
      text-align: center;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 34px;
    }

    .start-btn, .ghost-btn, .restart-btn {
      border: 0;
      cursor: pointer;
      color: white;
      font-weight: 800;
      letter-spacing: .18em;
      border-radius: 2px;
      transition: transform .28s ease, box-shadow .28s ease, color .28s ease, border-color .28s ease, background .28s ease;
    }

    .start-btn, .ghost-btn {
      width: 100%;
      padding: 12px 18px;
      font-size: 13px;
      color: rgba(255,255,255,.9);
      background: transparent;
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: none;
    }

    .ghost-btn {
      color: rgba(245,239,255,.64);
      border-color: rgba(255,255,255,.16);
    }

    .ghost-btn.recommended {
      color: #160f24;
      border-color: rgba(241,214,138,.86);
      background: linear-gradient(135deg, rgba(241,214,138,.96), rgba(255,235,176,.82));
      box-shadow: 0 0 30px rgba(241,214,138,.24);
    }

    .ghost-btn.recommended::after {
      content: "推荐";
      margin-left: 8px;
      font-size: 10px;
      letter-spacing: .12em;
      opacity: .72;
    }

    .start-btn:hover, .ghost-btn:hover, .restart-btn:hover {
      transform: translateY(-1px);
      filter: none;
      color: var(--gold);
      border-color: rgba(241,214,138,.72);
      background: rgba(241,214,138,0.08);
      box-shadow: 0 0 26px rgba(241, 214, 138, 0.18);
    }

    .seed-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 0 0 18px;
    }

    .seed-btn {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 7px 10px;
      color: rgba(245,239,255,.56);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: .08em;
    }

    .seed-btn:hover {
      color: var(--gold);
      border-color: rgba(241,214,138,.38);
    }

    .hud {
      position: fixed;
      z-index: 20;
      left: 50%;
      top: 18px;
      width: min(520px, calc(100vw - 32px));
      transform: translateX(-50%);
      pointer-events: none;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 28px;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 10px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(6, 4, 15, .38);
      color: rgba(245,239,255,.62);
      backdrop-filter: blur(12px);
      font-size: 12px;
      line-height: 1.45;
    }

    .phase-track {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      width: min(340px, 100%);
      margin: 0 auto;
    }

    .phase {
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      color: rgba(245,239,255,.48);
      background: rgba(255,255,255,.05);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .phase.active {
      color: white;
      border-color: rgba(255,255,255,.24);
      background: linear-gradient(135deg, rgba(183,140,255,.28), rgba(255,129,216,.16));
      box-shadow: 0 0 18px rgba(183,140,255,.16);
    }

    .dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 16px var(--danger);
    }

    .dot.on {
      background: #80ffcd;
      box-shadow: 0 0 16px #80ffcd;
    }

    .hint {
      position: fixed;
      left: 22px;
      bottom: 20px;
      z-index: 15;
      max-width: min(520px, calc(100vw - 44px));
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(9, 6, 20, .52);
      backdrop-filter: blur(14px);
      color: rgba(245,239,255,.74);
      font-size: 13px;
      line-height: 1.7;
    }

    .question-result {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: 42px;
      width: min(760px, calc(100vw - 42px));
      transform: translateX(-50%) translateY(28px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease, transform .8s ease;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 24px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        rgba(10, 7, 23, .74);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      text-align: center;
    }

    .question-result.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .result-kicker {
      margin-bottom: 6px;
      color: rgba(245,239,255,.58);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .18em;
    }

    .question-result h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.1;
    }

    .question-result .q {
      margin-bottom: 10px;
      color: rgba(245,239,255,.66);
      font-size: 13px;
    }

    .question-result .a {
      color: white;
      font-size: 16px;
      line-height: 1.75;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
      text-align: left;
    }

    .result-note {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,.055);
    }

    .result-note strong {
      display: block;
      margin-bottom: 4px;
      color: rgba(255,255,255,.94);
      font-size: 13px;
    }

    .result-note span {
      color: rgba(245,239,255,.7);
      font-size: 13px;
      line-height: 1.65;
    }

    .restart-btn {
      margin-top: 16px;
      padding: 11px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(183,140,255,.9), rgba(255,129,216,.86));
      box-shadow: 0 12px 32px rgba(183,140,255,.2);
    }

    .video-wrap {
      position: fixed;
      z-index: 18;
      left: 22px;
      top: 22px;
      width: 180px;
      height: 135px;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      box-shadow: 0 15px 50px rgba(0,0,0,.28);
      opacity: .68;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .hand-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    @media (max-width: 900px) {
      .hud { top: 10px; }
      .status { font-size: 11px; margin-bottom: 7px; }
      .phase { min-height: 26px; font-size: 10px; }
      .hint { display: none; }
      .video-wrap { width: 132px; height: 99px; left: 12px; top: 12px; }
      .question-result {
        bottom: 164px;
        max-height: calc(100vh - 190px);
        overflow: auto;
      }
      .result-grid { grid-template-columns: 1fr; }
      .action-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="threeCanvas"></canvas>
    <div class="grain"></div>
    <div class="vignette"></div>

    <section id="intro" class="intro-modal">
      <div class="intro-card">
        <div class="sigil"></div>
        <h1>星夜秘仪</h1>
        <p>让喧嚣慢慢沉下去。<br>在下方写下此刻最想询问的事。<br>用手势或指尖拨动星轨，让一张牌替你照见答案。</p>
        <div class="seed-row" aria-label="问题灵感">
          <button class="seed-btn" data-seed="我现在最该看清什么？">✦ 看清什么</button>
          <button class="seed-btn" data-seed="这件事下一步应该怎么推进？">✦ 下一步</button>
          <button class="seed-btn" data-seed="我需要放下什么，保留什么？">✦ 取舍</button>
        </div>
        <textarea id="questionInput" placeholder="写下你想询问的事..."></textarea>
        <div class="action-row">
          <button id="startBtn" class="start-btn">手势抽牌</button>
          <button id="manualBtn" class="ghost-btn">直接抽牌</button>
        </div>
      </div>
    </section>

    <aside class="hud">
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">等待开始感知</span>
      </div>
      <div class="phase-track" aria-label="抽牌阶段">
        <span class="phase active" data-phase="waitingOpen">定问</span>
        <span class="phase" data-phase="fistSeen">聚焦</span>
        <span class="phase" data-phase="drawn">揭牌</span>
      </div>
    </aside>

    <div class="video-wrap">
      <video id="video" playsinline muted></video>
      <canvas id="handCanvas" class="hand-canvas"></canvas>
    </div>

    <div class="hint">
      手势说明：手掌左右移动会旋转牌堆；离正前方最近的牌会浮起发光。完成「张开 → 握拳 → 张开」后抽出当前高亮牌。没有摄像头时，移动鼠标或手指选择牌位，点击画面即可抽取。
    </div>

    <div id="resultBox" class="question-result">
      <div class="result-kicker">THE CARD OPENS</div>
      <h2 id="resultTitle"></h2>
      <div id="resultQuestion" class="q"></div>
      <div id="resultAnswer" class="a"></div>
      <div class="result-grid">
        <div class="result-note">
          <strong>关键词</strong>
          <span id="resultKeyword"></span>
        </div>
        <div class="result-note">
          <strong>行动建议</strong>
          <span id="resultAction"></span>
        </div>
      </div>
      <button id="restartBtn" class="restart-btn">重新开启</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    const tarotDeck = [
      { name: "愚者", meaning: "新的旅程正在打开。它提醒你允许自己尝试，但不要把冲动误认为勇气。" },
      { name: "魔术师", meaning: "你手里已经有足够的工具。关键不是再等条件成熟，而是开始组合已有资源。" },
      { name: "女祭司", meaning: "答案不急着说出口。多观察隐藏的信息，直觉会比表面逻辑更早抵达。" },
      { name: "女皇", meaning: "事情需要被温柔地培育。给它时间，也给自己一点稳定的滋养。" },
      { name: "皇帝", meaning: "边界、秩序和责任变得重要。你需要把松散的想法落到清晰规则里。" },
      { name: "教皇", meaning: "传统经验或可靠的前辈能给你支点。别急着孤军奋战。" },
      { name: "恋人", meaning: "选择背后是价值排序。真正的问题不是选谁，而是你想成为什么样的人。" },
      { name: "战车", meaning: "方向已经出现，但需要纪律感。把分散的力气收回来，稳稳推进。" },
      { name: "力量", meaning: "这不是硬碰硬的局面。温和、耐心、自控，反而是更强的力量。" },
      { name: "隐者", meaning: "暂时后退不是逃避，而是为了看清。安静下来，答案会变得更具体。" },
      { name: "命运之轮", meaning: "局势正在转动。你无法控制全部变化，但可以抓住变化中的窗口。" },
      { name: "正义", meaning: "请回到事实与后果。公平不只对别人，也包括对自己诚实。" },
      { name: "倒吊人", meaning: "停顿本身就是信息。换一个角度看，你会发现真正被卡住的地方。" },
      { name: "死神", meaning: "某个阶段正在结束。它未必是坏事，旧结构退场后，新空间才会出现。" },
      { name: "节制", meaning: "答案在调和之中。不要走极端，把节奏放慢一点会更稳。" },
      { name: "恶魔", meaning: "有些东西看似吸引，其实在消耗你。看清依赖，才有松绑的可能。" },
      { name: "高塔", meaning: "不稳定的结构可能被打破。震动虽然难受，却能暴露真正的问题。" },
      { name: "星星", meaning: "希望不是空话，而是恢复感正在发生。请给自己一点重新相信的空间。" },
      { name: "月亮", meaning: "情绪和想象会放大不确定。别急着下结论，先分清事实与投射。" },
      { name: "太阳", meaning: "事情会变得更明亮。坦诚、直接、简单，可能是最有效的方式。" },
      { name: "审判", meaning: "你正在面对一次重新评估。过去的经验不是包袱，而是提醒。" },
      { name: "世界", meaning: "一个循环接近完成。你可以收束、确认成果，然后进入新的阶段。" }
    ];

    const isMobileUA = /Android|iPhone|iPad|iPod|Mobile|HarmonyOS|MiuiBrowser|HuaweiBrowser/i.test(navigator.userAgent);
    const profiles = {
      visual: {
        pixelRatio: Math.min(window.devicePixelRatio, 1.8),
        activeParticles: 4600,
        particleLerp: 0.058,
        pointSize: 0.048,
        pointPulse: 0.008,
        opacityBase: 0.82,
        opacityPulse: 0.12
      },
      gestureLite: {
        pixelRatio: Math.min(window.devicePixelRatio, 1),
        activeParticles: 1200,
        particleLerp: 0.035,
        pointSize: 0.036,
        pointPulse: 0.003,
        opacityBase: 0.62,
        opacityPulse: 0.04
      }
    };

    const appState = {
      started: false,
      drawn: false,
      userQuestion: "",
      theme: new THREE.Color("#b78cff"),
      particleMode: "cosmos",
      renderProfile: "visual",
      activeParticles: profiles.visual.activeParticles,
      deckRotation: 0,
      targetDeckRotation: 0,
      highlightedIndex: 0,
      handX: 0.5,
      handTargetX: 0.5,
      manualMode: false,
      gesture: "unknown",
      gestureSamples: [],
      releaseFrames: 0,
      gesturePhase: "waitingOpen",
      lastGestureChange: performance.now(),
      lastPhaseChange: performance.now(),
      lastHandSeen: 0,
      chosenCardName: "",
      cameraReady: false
    };

    const canvas = document.getElementById("threeCanvas");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(profiles.visual.pixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x070512, 0.045);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.7, 10.8);
    camera.lookAt(0, 0.3, 0);

    const ambientLight = new THREE.AmbientLight(0xb78cff, 0.8);
    scene.add(ambientLight);

    const keyLight = new THREE.PointLight(0xffffff, 1.8, 18);
    keyLight.position.set(0, 4, 5);
    scene.add(keyLight);

    const sideLight = new THREE.PointLight(0xb78cff, 1.3, 20);
    sideLight.position.set(-4, 2, 2);
    scene.add(sideLight);

    const deckGroup = new THREE.Group();
    scene.add(deckGroup);

    const CARD_COUNT = 22;
    const CARD_W = 1.05;
    const CARD_H = 1.62;
    const RADIUS = 4.35;
    const cards = [];

    function makeRoundedCardTexture(type, tarot) {
      const c = document.createElement("canvas");
      c.width = 512;
      c.height = 768;
      const ctx = c.getContext("2d");
      const grd = ctx.createLinearGradient(0, 0, 512, 768);
      if (type === "back") {
        grd.addColorStop(0, "#211342");
        grd.addColorStop(.5, "#090717");
        grd.addColorStop(1, "#3c1d58");
      } else {
        grd.addColorStop(0, "#f8ecce");
        grd.addColorStop(.56, "#fffaf0");
        grd.addColorStop(1, "#d8b66b");
      }
      ctx.fillStyle = grd;
      roundRect(ctx, 26, 26, 460, 716, 34);
      ctx.fill();

      ctx.strokeStyle = type === "back" ? "rgba(255,255,255,.56)" : "rgba(72,41,12,.76)";
      ctx.lineWidth = 8;
      roundRect(ctx, 42, 42, 428, 684, 28);
      ctx.stroke();

      ctx.lineWidth = 2;
      ctx.strokeStyle = type === "back" ? "rgba(183,140,255,.72)" : "rgba(132,82,22,.72)";
      roundRect(ctx, 68, 72, 376, 624, 22);
      ctx.stroke();

      if (type === "back") {
        ctx.save();
        ctx.translate(256, 384);
        for (let i = 0; i < 16; i++) {
          ctx.rotate(Math.PI / 8);
          ctx.beginPath();
          ctx.moveTo(0, -178);
          ctx.quadraticCurveTo(38, -70, 0, 0);
          ctx.quadraticCurveTo(-38, -70, 0, -178);
          ctx.strokeStyle = `rgba(255,255,255,${0.18 + (i % 2) * 0.12})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(0, 0, 132, 0, Math.PI * 2);
        ctx.arc(0, 0, 72, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,.42)";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,.92)";
        star(ctx, 0, 0, 5, 34, 13);
        ctx.fill();
        ctx.restore();

        ctx.font = "700 34px Georgia, serif";
        ctx.fillStyle = "rgba(255,255,255,.78)";
        ctx.textAlign = "center";
        ctx.fillText("ARCANA", 256, 662);
      } else {
        drawTarotFace(ctx, tarot);
      }

      const texture = new THREE.CanvasTexture(c);
      texture.encoding = THREE.sRGBEncoding;
      texture.anisotropy = 8;
      return texture;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function star(ctx, x, y, points, outer, inner) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const a = -Math.PI / 2 + i * Math.PI / points;
        const r = i % 2 === 0 ? outer : inner;
        ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
      ctx.closePath();
    }

    function drawTarotFace(ctx, tarot) {
      ctx.fillStyle = "rgba(69,41,14,.88)";
      ctx.textAlign = "center";
      ctx.font = "700 52px 'Microsoft YaHei', serif";
      wrapText(ctx, tarot.name, 256, 128, 360, 62);

      ctx.save();
      ctx.translate(256, 350);
      ctx.strokeStyle = "rgba(100,58,19,.86)";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(0, 0, 124, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, 82, 0, Math.PI * 2);
      ctx.stroke();
      for (let i = 0; i < 12; i++) {
        const a = i / 12 * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 54, Math.sin(a) * 54);
        ctx.lineTo(Math.cos(a) * 148, Math.sin(a) * 148);
        ctx.stroke();
      }
      ctx.fillStyle = "rgba(100,58,19,.9)";
      star(ctx, 0, 0, 6, 58, 22);
      ctx.fill();
      ctx.restore();

      ctx.font = "400 28px 'Microsoft YaHei', sans-serif";
      ctx.fillStyle = "rgba(69,41,14,.82)";
      wrapText(ctx, tarot.meaning, 256, 570, 360, 42);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      let line = "";
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = chars[i];
          y += lineHeight;
        } else {
          line = test;
        }
      }
      ctx.fillText(line, x, y);
    }

    const cardGeo = new THREE.BoxGeometry(CARD_W, CARD_H, 0.055, 2, 2, 1);
    const edgeGeo = new THREE.EdgesGeometry(cardGeo);
    const backTexture = makeRoundedCardTexture("back");

    function createCard(index) {
      const group = new THREE.Group();
      group.userData.index = index;

      const baseMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        map: backTexture,
        roughness: 0.35,
        metalness: 0.16,
        emissive: 0x21114d,
        emissiveIntensity: 0.18
      });
      const mesh = new THREE.Mesh(cardGeo, baseMat);
      group.add(mesh);

      const edgeMat = new THREE.LineBasicMaterial({ color: 0xb78cff, transparent: true, opacity: 0.28 });
      const edges = new THREE.LineSegments(edgeGeo, edgeMat);
      group.add(edges);

      const angle = index / CARD_COUNT * Math.PI * 2;
      group.userData.baseAngle = angle;
      group.userData.mesh = mesh;
      group.userData.edges = edges;
      group.userData.edgeMat = edgeMat;
      group.userData.baseMat = baseMat;
      deckGroup.add(group);
      cards.push(group);
    }

    for (let i = 0; i < CARD_COUNT; i++) createCard(i);

    const particleCount = 4600;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleTargets = new Float32Array(particleCount * 3);
    const particleSeeds = new Float32Array(particleCount * 4);

    for (let i = 0; i < particleCount; i++) {
      particleSeeds[i * 4] = Math.random();
      particleSeeds[i * 4 + 1] = Math.random();
      particleSeeds[i * 4 + 2] = Math.random();
      particleSeeds[i * 4 + 3] = Math.random();
      const p = getParticleTarget(i, "cosmos", 0);
      particlePositions[i * 3] = p.x;
      particlePositions[i * 3 + 1] = p.y;
      particlePositions[i * 3 + 2] = p.z;
      particleTargets[i * 3] = p.x;
      particleTargets[i * 3 + 1] = p.y;
      particleTargets[i * 3 + 2] = p.z;
    }

    particleGeo.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
    particleGeo.setDrawRange(0, appState.activeParticles);
    const particleMat = new THREE.PointsMaterial({
      color: appState.theme,
      size: 0.052,
      transparent: true,
      opacity: 0.9,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    function applyRenderProfile(name) {
      const next = profiles[name] || profiles.visual;
      appState.renderProfile = name;
      appState.activeParticles = next.activeParticles;
      renderer.setPixelRatio(next.pixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      particleGeo.setDrawRange(0, appState.activeParticles);
      particleMat.size = next.pointSize;
      particleMat.opacity = next.opacityBase;
    }

    function getParticleTarget(i, mode, t) {
      const a = particleSeeds[i * 4] * Math.PI * 2;
      const b = particleSeeds[i * 4 + 1];
      const c = particleSeeds[i * 4 + 2];
      const d = particleSeeds[i * 4 + 3];

      if (mode === "circle") {
        const ring = Math.floor(b * 8);
        const r = 1.4 + ring * 0.55 + Math.sin(a * 9 + t * 1.2) * 0.06;
        return {
          x: Math.cos(a) * r,
          y: -0.9 + ring * 0.08 + Math.sin(a * 14 + t) * 0.07,
          z: Math.sin(a) * r
        };
      }

      if (mode === "vortex") {
        const height = (b - 0.5) * 6.6;
        const twist = a + height * 2.45 + t * 0.9;
        const r = 0.65 + c * 4.4 + Math.sin(t * 1.2 + c * 14) * 0.18;
        return {
          x: Math.cos(twist) * r,
          y: height,
          z: Math.sin(twist) * r
        };
      }

      if (mode === "cosmos") {
        const lane = d < 0.34 ? "nebula" : d < 0.67 ? "vortex" : "circle";
        return getParticleTarget(i, lane, t);
      }

      const theta = a + t * (0.12 + d * 0.12);
      const phi = Math.acos(2 * b - 1);
      const r = 3.1 + c * 4.9 + Math.sin(t * 0.9 + a * 5) * 0.16;
      return {
        x: r * Math.sin(phi) * Math.cos(theta),
        y: r * Math.cos(phi) * 0.9,
        z: r * Math.sin(phi) * Math.sin(theta)
      };
    }

    function updateParticleTargets(mode, time) {
      for (let i = 0; i < appState.activeParticles; i++) {
        const p = getParticleTarget(i, mode, time);
        particleTargets[i * 3] = p.x;
        particleTargets[i * 3 + 1] = p.y;
        particleTargets[i * 3 + 2] = p.z;
      }
    }

    function disposeCardTextureIfNeeded(mat) {
      if (mat && mat.map && mat.map !== backTexture) mat.map.dispose();
    }

    function setTheme(hex) {
      appState.theme.set(hex);
      particleMat.color.copy(appState.theme);
      ambientLight.color.copy(appState.theme);
      sideLight.color.copy(appState.theme);
      document.documentElement.style.setProperty("--theme", hex);
      document.documentElement.style.setProperty("--theme-soft", hexToRgba(hex, .22));
      const colorValue = document.getElementById("colorValue");
      if (colorValue) colorValue.textContent = hex.toLowerCase();
      for (const c of cards) c.userData.edgeMat.color.copy(appState.theme);
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function layoutCards(dt) {
      const lerp = 1 - Math.pow(0.0001, dt);
      appState.deckRotation += (appState.targetDeckRotation - appState.deckRotation) * lerp;

      if (!appState.drawn) {
        let bestIndex = 0;
        let bestZ = -Infinity;
        for (let i = 0; i < cards.length; i++) {
          const group = cards[i];
          const a = group.userData.baseAngle + appState.deckRotation;
          const spiral = (i - CARD_COUNT / 2) * 0.025;
          const x = Math.sin(a) * RADIUS;
          const z = Math.cos(a) * RADIUS;
          const y = Math.sin(a * 2.0) * 0.12 + spiral;

          group.position.set(x, y, z);
          group.rotation.set(0, a + Math.PI, Math.sin(a) * 0.06);

          const isFrontCandidate = z > bestZ;
          if (isFrontCandidate) {
            bestZ = z;
            bestIndex = i;
          }
        }
        appState.highlightedIndex = bestIndex;
      }

      if (appState.drawn) return;

      for (let i = 0; i < cards.length; i++) {
        const group = cards[i];
        const hot = i === appState.highlightedIndex;
        const targetScale = hot ? 1.14 : 1.0;
        group.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.13);
        group.userData.baseMat.emissiveIntensity += ((hot ? 0.78 : 0.16) - group.userData.baseMat.emissiveIntensity) * 0.12;
        group.userData.edgeMat.opacity += ((hot ? 0.9 : 0.24) - group.userData.edgeMat.opacity) * 0.12;
        if (hot) {
          group.position.y += 0.26;
        }
      }
    }

    function animateParticles(time) {
      if (!appState.drawn) updateParticleTargets(appState.particleMode, time);
      const profile = profiles[appState.renderProfile] || profiles.visual;
      const pos = particleGeo.attributes.position.array;
      for (let i = 0; i < appState.activeParticles; i++) {
        const idx = i * 3;
        pos[idx] += (particleTargets[idx] - pos[idx]) * profile.particleLerp;
        pos[idx + 1] += (particleTargets[idx + 1] - pos[idx + 1]) * profile.particleLerp;
        pos[idx + 2] += (particleTargets[idx + 2] - pos[idx + 2]) * profile.particleLerp;
      }
      particleGeo.attributes.position.needsUpdate = true;
      particleMat.size = profile.pointSize + Math.sin(time * 2.3) * profile.pointPulse;
      particleMat.opacity = profile.opacityBase + Math.sin(time * 1.7) * profile.opacityPulse;
      particles.rotation.y = time * (appState.renderProfile === "gestureLite" ? 0.035 : 0.075);
      particles.rotation.x = Math.sin(time * 0.21) * (appState.renderProfile === "gestureLite" ? 0.06 : 0.16);
    }

    function scatterOtherCards(selected) {
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card === selected) continue;
        const world = new THREE.Vector3();
        card.getWorldPosition(world);
        const base = i * 3;
        for (let k = 0; k < 170 && base + k < appState.activeParticles; k++) {
          const pIndex = base + k;
          particlePositions[pIndex * 3] = world.x + (Math.random() - .5) * .4;
          particlePositions[pIndex * 3 + 1] = world.y + (Math.random() - .5) * .4;
          particlePositions[pIndex * 3 + 2] = world.z + (Math.random() - .5) * .4;
          const out = world.clone().normalize().multiplyScalar(6 + Math.random() * 5);
          particleTargets[pIndex * 3] = out.x + (Math.random() - .5) * 5;
          particleTargets[pIndex * 3 + 1] = out.y + (Math.random() - .5) * 5;
          particleTargets[pIndex * 3 + 2] = out.z + (Math.random() - .5) * 5;
        }
        gsap.to(card.scale, { x: 0.01, y: 0.01, z: 0.01, duration: 0.38, ease: "power2.in" });
        gsap.to(card.rotation, { x: card.rotation.x + Math.random() * 3, y: card.rotation.y + Math.random() * 3, duration: 0.42 });
      }
      particleGeo.attributes.position.needsUpdate = true;
    }

    function drawSelectedCard() {
      if (appState.drawn) return;
      appState.drawn = true;
      updatePhase("drawn");
      setStatus("抽卡完成，正在翻开牌面", true);

      const selected = cards[appState.highlightedIndex];
      const tarot = pickTarot();
      appState.chosenCardName = tarot.name;
      const frontTexture = makeRoundedCardTexture("front", tarot);
      disposeCardTextureIfNeeded(selected.userData.baseMat);
      selected.userData.baseMat.map = frontTexture;
      selected.userData.baseMat.emissive.set(0x000000);
      selected.userData.baseMat.emissiveIntensity = 0.04;
      selected.userData.baseMat.needsUpdate = true;

      scatterOtherCards(selected);
      deckGroup.remove(selected);
      scene.add(selected);

      const startWorld = new THREE.Vector3();
      selected.getWorldPosition(startWorld);
      selected.position.copy(startWorld);
      selected.rotation.set(0, 0, 0);
      selected.scale.set(1.18, 1.18, 1.18);

      gsap.timeline()
        .to(selected.position, { x: 0, y: 0.42, z: 2.9, duration: 0.9, ease: "power3.inOut" }, 0)
        .to(selected.scale, { x: 1.72, y: 1.72, z: 1.72, duration: 0.9, ease: "power3.inOut" }, 0)
        .to(selected.rotation, { y: Math.PI * 2, z: 0, duration: 1.18, ease: "power2.inOut" }, 0.32)
        .to(selected.position, { x: 0, y: 0.12, z: 6.85, duration: 0.92, ease: "expo.out" }, 1.18)
        .to(selected.scale, { x: 4.15, y: 4.15, z: 4.15, duration: 0.92, ease: "expo.out" }, 1.18)
        .to(selected.rotation, { z: 0.022, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.8)
        .call(() => showResult(tarot), null, 2.38);
    }

    function pickTarot() {
      return tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
    }

    function buildReading(tarot) {
      const keywordMap = {
        "愚者": "开始 / 试错 / 保持轻盈",
        "魔术师": "资源 / 执行 / 主动组合",
        "女祭司": "直觉 / 暂停 / 隐藏信息",
        "女皇": "滋养 / 生长 / 耐心",
        "皇帝": "边界 / 规则 / 责任",
        "教皇": "经验 / 指引 / 传统路径",
        "恋人": "选择 / 价值排序 / 关系",
        "战车": "方向 / 纪律 / 推进",
        "力量": "温和 / 自控 / 长期主义",
        "隐者": "独处 / 复盘 / 看清",
        "命运之轮": "变化 / 时机 / 窗口",
        "正义": "事实 / 后果 / 公平",
        "倒吊人": "换角度 / 停顿 / 松手",
        "死神": "结束 / 转场 / 新空间",
        "节制": "调和 / 节奏 / 平衡",
        "恶魔": "依赖 / 消耗 / 松绑",
        "高塔": "破局 / 暴露问题 / 重建",
        "星星": "希望 / 恢复 / 重新相信",
        "月亮": "情绪 / 投射 / 不确定",
        "太阳": "坦诚 / 明亮 / 简单",
        "审判": "评估 / 唤醒 / 重新选择",
        "世界": "完成 / 收束 / 下一阶段"
      };
      const actions = [
        "把问题拆成一个今天能完成的小动作，先别追求完美答案。",
        "给自己十分钟写下事实、猜测和情绪，把三者分开看。",
        "找一个可信的人复述你的判断，看看哪里还站不稳。",
        "先暂停一次冲动选择，让明天的自己再确认。",
        "把最消耗你的环节减掉一点，把最有效的环节重复一次。"
      ];
      const seed = Math.abs((tarot.name.charCodeAt(0) || 0) + appState.highlightedIndex);
      return {
        keyword: keywordMap[tarot.name] || "观察 / 选择 / 行动",
        action: actions[seed % actions.length]
      };
    }

    function showResult(tarot) {
      const reading = buildReading(tarot);
      document.getElementById("resultTitle").textContent = tarot.name;
      document.getElementById("resultQuestion").textContent = `你的问题：${appState.userQuestion || "那个还没有说出口的问题"}`;
      document.getElementById("resultAnswer").textContent = tarot.meaning;
      document.getElementById("resultKeyword").textContent = reading.keyword;
      document.getElementById("resultAction").textContent = reading.action;
      document.getElementById("resultBox").classList.add("show");
      setStatus("仪式完成，可以点击结果面板重新开启", true);
    }

    let prevTime = performance.now();
    function renderLoop(now) {
      const dt = Math.min((now - prevTime) / 1000, 0.05);
      prevTime = now;
      const t = now / 1000;

      if (!appState.started && !appState.drawn) {
        appState.targetDeckRotation += dt * 0.22;
      }

      deckGroup.rotation.y = 0;
      deckGroup.rotation.x = Math.sin(t * 0.4) * 0.035;
      layoutCards(dt);
      animateParticles(t);
      const handEase = appState.renderProfile === "gestureLite" ? 0.1 : 0.14;
      appState.handX += (appState.handTargetX - appState.handX) * handEase;
      appState.targetDeckRotation = (appState.handX - 0.5) * Math.PI * 2.15;
      camera.position.x += ((appState.handX - 0.5) * 0.55 - camera.position.x) * 0.035;
      camera.lookAt(0, 0.35, 0);
      renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio((profiles[appState.renderProfile] || profiles.visual).pixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.querySelectorAll(".seed-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById("questionInput").value = btn.dataset.seed;
      });
    });

    if (isMobileUA) {
      document.getElementById("manualBtn").classList.add("recommended");
      document.getElementById("startBtn").textContent = "手势抽牌";
      setStatus("手机端推荐直接抽牌，体验更稳定", true);
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      appState.userQuestion = document.getElementById("questionInput").value.trim();
      document.getElementById("intro").classList.add("hidden");
      appState.started = true;
      appState.manualMode = false;
      applyRenderProfile(isMobileUA ? "gestureLite" : "visual");
      updatePhase("waitingOpen");
      setStatus(isMobileUA ? "手机手势模式已降档，优先保证识别" : "正在请求摄像头权限", false);
      await startHandTracking();
    });

    document.getElementById("manualBtn").addEventListener("click", () => {
      startManualMode();
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      resetReading();
    });

    function startManualMode() {
      appState.userQuestion = document.getElementById("questionInput").value.trim();
      document.getElementById("intro").classList.add("hidden");
      appState.started = true;
      appState.manualMode = true;
      applyRenderProfile("visual");
      updatePhase("fistSeen");
      setStatus("移动鼠标或手指选择牌位，点击画面抽牌", true);
    }

    function resetReading() {
      document.getElementById("resultBox").classList.remove("show");
      document.getElementById("intro").classList.remove("hidden");
      document.getElementById("questionInput").value = "";
      appState.started = false;
      appState.drawn = false;
      appState.manualMode = false;
      appState.userQuestion = "";
      appState.chosenCardName = "";
      appState.gesture = "unknown";
      appState.gestureSamples = [];
      appState.releaseFrames = 0;
      appState.gesturePhase = "waitingOpen";
      appState.lastGestureChange = performance.now();
      appState.lastPhaseChange = performance.now();
      appState.handX = 0.5;
      appState.handTargetX = 0.5;
      appState.targetDeckRotation = 0;
      appState.particleMode = "cosmos";
      applyRenderProfile("visual");
      updatePhase("waitingOpen");
      setStatus(appState.cameraReady ? "摄像头保持开启，写下新问题即可继续" : "等待开始感知", appState.cameraReady);

      for (const card of cards) {
        gsap.killTweensOf(card.position);
        gsap.killTweensOf(card.rotation);
        gsap.killTweensOf(card.scale);
        if (card.parent !== deckGroup) {
          if (card.parent) card.parent.remove(card);
          deckGroup.add(card);
        }
        disposeCardTextureIfNeeded(card.userData.baseMat);
        card.userData.baseMat.map = backTexture;
        card.userData.baseMat.emissive.set(0x21114d);
        card.userData.baseMat.emissiveIntensity = 0.18;
        card.userData.baseMat.needsUpdate = true;
        card.userData.edgeMat.opacity = 0.28;
        card.scale.set(1, 1, 1);
      }
      deckGroup.scale.set(1, 1, 1);
      updateParticleTargets(appState.particleMode, performance.now() / 1000);
    }

    function updatePhase(phase) {
      document.querySelectorAll(".phase").forEach(item => {
        item.classList.toggle("active", item.dataset.phase === phase);
      });
    }

    function updatePointerSelection(clientX) {
      if (!appState.started || appState.drawn) return;
      const x = Math.min(Math.max(clientX / window.innerWidth, 0), 1);
      appState.handTargetX += (x - appState.handTargetX) * 0.55;
      if (appState.manualMode) intensifyParticles();
    }

    canvas.addEventListener("pointermove", e => updatePointerSelection(e.clientX));
    canvas.addEventListener("pointerdown", () => {
      if (appState.manualMode && appState.started && !appState.drawn) {
        pulseDeck();
        drawSelectedCard();
      }
    });

    window.addEventListener("keydown", e => {
      if ((e.key === "Enter" || e.key === " ") && appState.manualMode && !appState.drawn) {
        e.preventDefault();
        pulseDeck();
        drawSelectedCard();
      }
    });

    function setStatus(text, ok) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("statusDot").classList.toggle("on", !!ok);
    }

    const video = document.getElementById("video");
    const handCanvas = document.getElementById("handCanvas");
    const handCtx = handCanvas.getContext("2d");
    let hands = null;
    let processingHands = false;
    let lastHandsSent = 0;
    let handLoopRunning = false;

    function waitForVideoReady(videoEl, timeout = 3500) {
      return new Promise((resolve, reject) => {
        const started = performance.now();
        const check = () => {
          if (videoEl.readyState >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            resolve();
            return;
          }
          if (performance.now() - started > timeout) {
            reject(new Error("video metadata timeout"));
            return;
          }
          requestAnimationFrame(check);
        };
        if (videoEl.readyState >= 1) check();
        else videoEl.addEventListener("loadedmetadata", check, { once: true });
      });
    }

    async function ensureVideoPlaying(videoEl) {
      await waitForVideoReady(videoEl);
      const playPromise = videoEl.play();
      if (playPromise) await playPromise;
      await waitForVideoReady(videoEl);
      if (videoEl.paused || videoEl.readyState < 2) {
        throw new Error("video did not start playing");
      }
    }

    async function startHandTracking() {
      try {
        if (appState.cameraReady && video.srcObject) {
          appState.gesture = "unknown";
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          appState.gesturePhase = "waitingOpen";
          appState.lastGestureChange = performance.now();
          appState.lastPhaseChange = performance.now();
          setStatus("摄像头已就绪，张开手掌开始选牌", true);
          return;
        }
        const videoProfile = isMobileUA
          ? { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 30, max: 30 } }
          : { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 60 } };
        const stream = await navigator.mediaDevices.getUserMedia({
          video: videoProfile,
          audio: false
        });
        video.srcObject = stream;
        video.muted = true;
        video.playsInline = true;
        await ensureVideoPlaying(video);
        handCanvas.width = video.videoWidth || 640;
        handCanvas.height = video.videoHeight || 480;

        if (typeof Hands === "undefined") {
          throw new Error("MediaPipe Hands failed to load");
        }

        hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({
          selfieMode: true,
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.78,
          minTrackingConfidence: 0.72
        });
        hands.onResults(onHandResults);
        appState.cameraReady = true;
        setStatus(isMobileUA ? "轻量手势模式已启动，张开手掌开始选牌" : "摄像头已启动，张开手掌开始选牌", true);
        if (!handLoopRunning) {
          handLoopRunning = true;
          requestAnimationFrame(handLoop);
        }
      } catch (err) {
        console.error(err);
        appState.manualMode = true;
        updatePhase("fistSeen");
        const message = err && err.message ? err.message : "";
        if (location.protocol !== "https:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
          setStatus("手机浏览器需要 HTTPS 才能开摄像头，已切换为点击抽牌", false);
        } else if (/MediaPipe|Hands/i.test(message)) {
          setStatus("手势识别资源加载失败，已切换为点击抽牌", false);
        } else if (/metadata|playing/i.test(message)) {
          setStatus("视频流没有正常启动，已切换为点击抽牌", false);
        } else {
          setStatus("摄像头启动失败，已切换为点击抽牌模式", false);
        }
      }
    }

    async function handLoop(now) {
      if (!hands || video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(handLoop);
        return;
      }
      // 控制识别频率，避免和 Three.js 渲染互相抢资源。30FPS 下通常能保持 100ms 内响应。
      if (!processingHands && now - lastHandsSent > 30) {
        processingHands = true;
        lastHandsSent = now;
        try {
          await hands.send({ image: video });
        } catch (e) {
          console.warn(e);
        } finally {
          processingHands = false;
        }
      }
      requestAnimationFrame(handLoop);
    }

    function onHandResults(results) {
      handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        if (performance.now() - appState.lastHandSeen > 800 && appState.started && !appState.drawn) {
          setStatus("未检测到手，请把单手放入画面", false);
        }
        return;
      }

      const lm = results.multiHandLandmarks[0];
      appState.lastHandSeen = performance.now();
      drawHandOverlay(lm);

      const palm = getPalmCenter(lm);
      // 视频预览被镜像，MediaPipe 坐标未镜像。这里使用 1 - x，使手往屏幕左移动时视觉更符合直觉。
      const mirroredX = 1 - palm.x;
      const moveDelta = mirroredX - appState.handTargetX;
      const deadZone = appState.renderProfile === "gestureLite" ? 0.024 : 0.014;
      if (Math.abs(moveDelta) > deadZone) {
        appState.handTargetX += moveDelta * 0.32;
      } else {
        appState.handTargetX += moveDelta * 0.08;
      }

      const rawGesture = classifyGesture(lm);
      const gesture = smoothGesture(rawGesture);
      updateGestureState(gesture, rawGesture);
    }

    function getPalmCenter(lm) {
      const ids = [0, 5, 9, 13, 17];
      const p = { x: 0, y: 0, z: 0 };
      for (const id of ids) {
        p.x += lm[id].x;
        p.y += lm[id].y;
        p.z += lm[id].z;
      }
      p.x /= ids.length;
      p.y /= ids.length;
      p.z /= ids.length;
      return p;
    }

    function dist(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dz = (a.z || 0) - (b.z || 0);
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function classifyGesture(lm) {
      const palm = getPalmCenter(lm);
      const wrist = lm[0];
      const indexMcp = lm[5];
      const middleMcp = lm[9];
      const ringMcp = lm[13];
      const pinkyMcp = lm[17];

      // 用掌宽 + 掌长做归一化，避免不同人手大小、离摄像头远近导致阈值漂移。
      const palmWidth = Math.max(dist(indexMcp, pinkyMcp), 0.001);
      const palmLength = Math.max(dist(wrist, middleMcp), 0.001);
      const handScale = (palmWidth + palmLength) * 0.5;

      // 四根长手指：如果指尖比 PIP 关节更靠近手腕，通常就是弯曲/握拳。
      const fingers = [
        { tip: 8, pip: 6, mcp: 5 },
        { tip: 12, pip: 10, mcp: 9 },
        { tip: 16, pip: 14, mcp: 13 },
        { tip: 20, pip: 18, mcp: 17 }
      ];

      let bent = 0;
      let open = 0;
      let avgTipPalm = 0;

      for (const f of fingers) {
        const tip = lm[f.tip];
        const pip = lm[f.pip];
        const mcp = lm[f.mcp];

        const tipToWrist = dist(tip, wrist);
        const pipToWrist = dist(pip, wrist);
        const tipToPalm = dist(tip, palm) / handScale;
        avgTipPalm += tipToPalm;

        // bent 条件写得宽一些：普通摄像头里手指略斜、手掌倾斜也能识别。
        const isBentByWrist = tipToWrist < pipToWrist + palmLength * 0.10;
        const isBentByPalm = tipToPalm < 1.18;
        const isOpenByPalm = tipToPalm > 1.34 && dist(tip, mcp) > dist(pip, mcp) * 1.08;

        if (isBentByWrist || isBentByPalm) bent++;
        if (isOpenByPalm) open++;
      }

      avgTipPalm /= fingers.length;

      // 拇指单独处理：握拳时拇指经常横在掌心，不一定满足和四指相同的规则。
      const thumbTipPalm = dist(lm[4], palm) / handScale;
      const thumbTipIndex = dist(lm[4], lm[5]) / handScale;
      const thumbLooksClosed = thumbTipPalm < 1.25 || thumbTipIndex < 0.92;
      const thumbLooksOpen = thumbTipPalm > 1.30 && thumbTipIndex > 0.82;

      if (thumbLooksClosed) bent += 0.6;
      if (thumbLooksOpen) open += 0.5;

      const isFist = bent >= 3.4 && avgTipPalm < 1.32;
      const isOpen = open >= 3.1 && avgTipPalm > 1.24;
      const isOpening = open >= 2.2 && avgTipPalm > 1.14 && bent < 3.1;

      if (isFist) return "fist";
      if (isOpen) return "open";
      if (isOpening) return "opening";
      return "neutral";
    }

    function smoothGesture(rawGesture) {
      const maxSamples = appState.renderProfile === "gestureLite" ? 7 : 5;
      appState.gestureSamples.push(rawGesture);
      if (appState.gestureSamples.length > maxSamples) appState.gestureSamples.shift();

      const counts = appState.gestureSamples.reduce((acc, item) => {
        acc[item] = (acc[item] || 0) + 1;
        return acc;
      }, {});
      const need = appState.renderProfile === "gestureLite" ? 4 : 3;
      const openVotes = (counts.open || 0) + (counts.opening || 0) * 0.7;
      const openNeed = appState.gesturePhase === "fistSeen" ? 1.4 : need;
      if (openVotes >= openNeed) return "open";
      if ((counts.fist || 0) >= need) return "fist";
      if ((counts.neutral || 0) >= need) return "neutral";
      return appState.gesture;
    }

    function updateGestureState(gesture, rawGesture) {
      if (!appState.started || appState.drawn) return;
      const now = performance.now();
      if (appState.gesturePhase === "fistSeen") {
        const releaseSignal = rawGesture === "open" ? 2 : (rawGesture === "opening" || gesture === "open" ? 1 : 0);
        appState.releaseFrames = releaseSignal ? Math.min(appState.releaseFrames + releaseSignal, 3) : 0;
        if (appState.releaseFrames >= 2 && now - appState.lastPhaseChange > 150) {
          appState.gesture = "open";
          appState.lastGestureChange = now;
          appState.lastPhaseChange = now;
          drawSelectedCard();
          return;
        }
      }

      if (gesture !== appState.gesture) {
        appState.gesture = gesture;
        appState.lastGestureChange = now;
        return;
      }

      const stableEnough = now - appState.lastGestureChange > 260;
      const phaseReady = now - appState.lastPhaseChange > 420;
      if (!stableEnough || !phaseReady || gesture === "neutral") return;

      if (appState.gesturePhase === "waitingOpen") {
        if (gesture === "open") {
          appState.gesturePhase = "openSeen";
          appState.lastPhaseChange = now;
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          updatePhase("waitingOpen");
          setStatus("已感知张开手掌，握拳抓取当前牌", true);
        } else {
          setStatus("请先张开手掌，让牌堆响应你的位置", true);
        }
        return;
      }

      if (appState.gesturePhase === "openSeen") {
        if (gesture === "fist") {
          appState.gesturePhase = "fistSeen";
          appState.lastPhaseChange = now;
          appState.gestureSamples = [];
          appState.releaseFrames = 0;
          updatePhase("fistSeen");
          pulseDeck();
          setStatus("已握拳，松开手掌完成抽卡", true);
        }
        return;
      }

      if (appState.gesturePhase === "fistSeen") {
        if (gesture === "open") {
          appState.lastPhaseChange = now;
          drawSelectedCard();
        } else if (gesture === "fist") {
          appState.targetDeckRotation += 0.012;
          intensifyParticles();
        }
      }
    }

    function pulseDeck() {
      gsap.fromTo(deckGroup.scale, { x: 1, y: 1, z: 1 }, { x: .86, y: .86, z: .86, duration: .18, yoyo: true, repeat: 1, ease: "power2.inOut" });
      keyLight.intensity = 3.8;
      gsap.to(keyLight, { intensity: 1.8, duration: .6, ease: "power2.out" });
    }

    function intensifyParticles() {
      particleMat.size += (0.082 - particleMat.size) * 0.08;
      particleMat.opacity += (0.98 - particleMat.opacity) * 0.08;
      for (let i = 0; i < appState.activeParticles; i += 4) {
        particleTargets[i * 3] *= 0.965;
        particleTargets[i * 3 + 1] *= 0.965;
        particleTargets[i * 3 + 2] *= 0.965;
      }
    }

    function drawHandOverlay(lm) {
      const w = handCanvas.width;
      const h = handCanvas.height;
      handCtx.save();
      handCtx.lineWidth = 3;
      handCtx.strokeStyle = "rgba(183,140,255,.82)";
      handCtx.fillStyle = "rgba(255,255,255,.9)";
      const chains = [
        [0,1,2,3,4], [0,5,6,7,8], [5,9,10,11,12], [9,13,14,15,16], [13,17,18,19,20], [0,17]
      ];
      for (const chain of chains) {
        handCtx.beginPath();
        for (let i = 0; i < chain.length; i++) {
          const p = lm[chain[i]];
          const x = p.x * w;
          const y = p.y * h;
          if (i === 0) handCtx.moveTo(x, y);
          else handCtx.lineTo(x, y);
        }
        handCtx.stroke();
      }
      for (const p of lm) {
        handCtx.beginPath();
        handCtx.arc(p.x * w, p.y * h, 3.2, 0, Math.PI * 2);
        handCtx.fill();
      }
      handCtx.restore();
    }
  </script>
</body>
</html>
