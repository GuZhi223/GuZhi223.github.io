<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="人民医院数字化青少年心理健康测评与筛查系统">
    <title>人民医院数字化青少年心理健康测评与筛查系统V5.1</title>
    
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        /* 自定义CSS变量 */
        :root {
            --primary-color: #1890ff;
            --primary-color-light: #e6f7ff;
            --primary-color-dark: #096dd9;
            --background-color: #f5f5f5;
            --text-color: #333333;
            --text-color-secondary: #666666;
            --border-color: #d9d9d9;
            --border-radius: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --error-color: #ff4d4f;
        }
        
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        /* 页面容器 */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 页眉样式 */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-color-dark));
            color: white;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .system-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--warning-color);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        /* 维护页面样式 */
        .maintenance-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .maintenance-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
        }
        
        .maintenance-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 20px;
        }
        
        .maintenance-subtitle {
            font-size: 16px;
            color: var(--text-color-secondary);
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .maintenance-info {
            background: var(--primary-color-light);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 30px;
        }
        
        .maintenance-info p {
            font-size: 14px;
            color: var(--primary-color);
            margin: 8px 0;
        }
        
        .maintenance-info strong {
            font-weight: 600;
        }
        
        /* 页脚样式 */
        .footer {
            background: white;
            border-top: 1px solid var(--border-color);
            padding: 16px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-color-secondary);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .system-title {
                font-size: 14px;
            }
            
            .maintenance-container {
                padding: 40px 20px;
            }
            
            .maintenance-title {
                font-size: 22px;
            }
            
            .maintenance-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 页眉 -->
        <header class="header">
            <div class="header-content">
                <div class="system-title">人民医院数字化青少年心理健康测评与筛查系统V5.1</div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>系统维护中</span>
                </div>
            </div>
        </header>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="maintenance-container">
                <div class="maintenance-icon">🔧</div>
                <h1 class="maintenance-title">服务器停机检修</h1>
                <p class="maintenance-subtitle">
                    尊敬的用户：<br><br>
                    为提供更优质的服务体验，系统正在进行紧急维护升级。<br>
                    预计恢复时间：2026年5月22日 08:00<br><br>
                    给您带来不便，敬请谅解。
                </p>
                
                <div class="maintenance-info">
                    <p><strong>维护内容：</strong></p>
                    <p>1. 系统安全加固与漏洞修复</p>
                    <p>2. 数据库优化与备份</p>
                    <p>3. 服务器性能升级</p>
                    <br>
                    <p><strong>联系方式：</strong></p>
                    <p>如有紧急情况，请联系：010-88886666</p>
                </div>
            </div>
        </main>
        
        <!-- 页脚 -->
        <footer class="footer">
            <p>人民医院心理健康中心 | 联系电话：010-88886666 | 工作时间：周一至周五 8:00-17:00</p>
            <p style="margin-top: 8px;">© 2026 人民医院 版权所有 | 技术支持：信息化建设办公室</p>
        </footer>
    </div>
</body>
</html>
